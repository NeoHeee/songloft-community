name: songloft_flutter
description: Songloft Community - 社区增强版音乐播放器
publish_to: 'none'
version: 1.0.0-community.2+3
license: Apache-2.0

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  # 路由
  go_router: ^17.1.0
  # HTTP
  dio: ^5.7.0
  # 音频播放
  just_audio: ^0.10.5
  just_audio_platform_interface: any  # SongloftMediaKitPlayer 实现 AudioPlayerPlatform
  just_audio_media_kit: ^2.0.0  # Windows/Linux 平台的 just_audio 后端（libmpv）
  media_kit: any  # EQ 均衡器需要直接访问 NativePlayer 设置 mpv 音频滤镜
  media_kit_libs_windows_audio: any
  media_kit_libs_linux: any
  audio_service: ^0.18.18
  audio_service_mpris: ^0.2.0
  audio_session: ^0.1.25
  rxdart: ^0.28.0
  # 本地存储
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  # 文件选择
  file_picker: ^10.3.10
  # 图片缓存
  cached_network_image: ^3.4.1
  # URL 启动
  url_launcher: ^6.3.2
  # 权限管理
  permission_handler: ^12.0.1
  # 桌面窗口
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  windows_single_instance: ^1.0.1
  # 其他
  package_info_plus: ^8.3.1
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  uuid: ^4.5.1
  mime: ^2.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/icon/
    - assets/images/branding/
    - assets/images/themes/
    - assets/images/tv/
    - assets/audio/
    - assets/licenses/

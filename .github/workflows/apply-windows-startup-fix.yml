name: Apply Windows Startup Fix

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/apply-windows-startup-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - name: Patch startup experience
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/main.dart')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              "import 'dart:io' show Platform;",
              "import 'dart:io' show Platform, Process;",
              1,
          )

          text = text.replace(
              "  await FileLogger.init();",
              "  try {\n    await FileLogger.init().timeout(const Duration(seconds: 3));\n  } catch (_) {\n    // 日志初始化失败不能阻止首帧显示。\n  }",
              1,
          )

          marker = "  PlatformDispatcher.instance.onError = (error, stack) {\n"
          start = text.index(marker)
          end_marker = "    return true;\n  };"
          end = text.index(end_marker, start) + len(end_marker)
          bootstrap = "\n\n  // 立即提交一个可见首帧。Windows 原生窗口会等待首帧后才显示，\n  // 因此后续插件或音频初始化即使缓慢，也不会再呈现纯白窗口。\n  runApp(const _NativeBootstrapApp());\n\n  try {"
          text = text[:end] + bootstrap + text[end:]

          text = text.replace(
              "  AppConfig.isTvMode = await TvDetector.isTv();",
              "  AppConfig.isTvMode = await TvDetector.isTv().timeout(\n    const Duration(seconds: 3),\n    onTimeout: () => false,\n  );",
              1,
          )

          text = text.replace(
              "      final prefs = await AppPreferences.create();\n      await prefs.migrateLegacyApiBaseUrl();",
              "      final prefs = await AppPreferences.create().timeout(\n        const Duration(seconds: 5),\n      );\n      await prefs.migrateLegacyApiBaseUrl().timeout(\n        const Duration(seconds: 5),\n      );",
              1,
          )

          text = text.replace(
              "    await SecureStorageService().getAccessToken();",
              "    await SecureStorageService().getAccessToken().timeout(\n      const Duration(seconds: 5),\n    );",
              1,
          )

          tail = "  WindowTrayManager.fixInitialSurfaceSize();\n}\n\nString _generateUserId()"
          replacement = """  WindowTrayManager.fixInitialSurfaceSize();
  } catch (error, stackTrace) {
    debugPrint('[Main] 启动失败: $error');
    debugPrint('[Main] Stack trace: $stackTrace');
    await FileLogger.flush();
    runApp(_StartupFailureApp(error: error.toString()));
  }
}

class _NativeBootstrapApp extends StatelessWidget {
  const _NativeBootstrapApp();

  @override
  Widget build(BuildContext context) {
    const seed = Color(0xFF6750A4);
    return MaterialApp(
      title: 'Songloft',
      debugShowCheckedModeBanner: false,
      themeMode: ThemeMode.system,
      theme: ThemeData(
        useMaterial3: true,
        colorScheme: ColorScheme.fromSeed(seedColor: seed),
      ),
      darkTheme: ThemeData(
        useMaterial3: true,
        colorScheme: ColorScheme.fromSeed(
          seedColor: seed,
          brightness: Brightness.dark,
        ),
      ),
      home: const Scaffold(
        body: Center(
          child: Column(
            mainAxisSize: MainAxisSize.min,
            children: [
              _StartupMark(),
              SizedBox(height: 24),
              SizedBox(
                width: 28,
                height: 28,
                child: CircularProgressIndicator(strokeWidth: 2.6),
              ),
              SizedBox(height: 18),
              Text('正在启动 Songloft…'),
              SizedBox(height: 6),
              Text(
                '正在初始化音频与桌面服务',
                style: TextStyle(fontSize: 12),
              ),
            ],
          ),
        ),
      ),
    );
  }
}

class _StartupMark extends StatelessWidget {
  const _StartupMark();

  @override
  Widget build(BuildContext context) {
    final colors = Theme.of(context).colorScheme;
    return Container(
      width: 76,
      height: 76,
      decoration: BoxDecoration(
        gradient: LinearGradient(
          begin: Alignment.topLeft,
          end: Alignment.bottomRight,
          colors: [colors.primaryContainer, colors.tertiaryContainer],
        ),
        borderRadius: BorderRadius.circular(25),
      ),
      child: Icon(Icons.graphic_eq_rounded, size: 40, color: colors.primary),
    );
  }
}

class _StartupFailureApp extends StatelessWidget {
  final String error;

  const _StartupFailureApp({required this.error});

  @override
  Widget build(BuildContext context) {
    const seed = Color(0xFF6750A4);
    return MaterialApp(
      title: 'Songloft 启动失败',
      debugShowCheckedModeBanner: false,
      theme: ThemeData(
        useMaterial3: true,
        colorScheme: ColorScheme.fromSeed(seedColor: seed),
      ),
      darkTheme: ThemeData(
        useMaterial3: true,
        colorScheme: ColorScheme.fromSeed(
          seedColor: seed,
          brightness: Brightness.dark,
        ),
      ),
      themeMode: ThemeMode.system,
      home: Scaffold(
        body: Center(
          child: ConstrainedBox(
            constraints: const BoxConstraints(maxWidth: 620),
            child: Padding(
              padding: const EdgeInsets.all(28),
              child: Column(
                mainAxisSize: MainAxisSize.min,
                children: [
                  const Icon(Icons.error_outline_rounded, size: 64),
                  const SizedBox(height: 18),
                  const Text(
                    'Songloft 启动失败',
                    style: TextStyle(fontSize: 22, fontWeight: FontWeight.w700),
                  ),
                  const SizedBox(height: 12),
                  const Text('程序没有继续停留在白屏。下面的信息可用于定位问题。'),
                  const SizedBox(height: 16),
                  Container(
                    width: double.infinity,
                    constraints: const BoxConstraints(maxHeight: 180),
                    padding: const EdgeInsets.all(14),
                    decoration: BoxDecoration(
                      color: Colors.black.withValues(alpha: 0.06),
                      borderRadius: BorderRadius.circular(14),
                    ),
                    child: SingleChildScrollView(
                      child: SelectableText(error),
                    ),
                  ),
                  if (FileLogger.logDir != null) ...[
                    const SizedBox(height: 16),
                    FilledButton.icon(
                      onPressed: () {
                        if (Platform.isWindows) {
                          Process.run('explorer', [FileLogger.logDir!]);
                        }
                      },
                      icon: const Icon(Icons.folder_open_rounded),
                      label: const Text('打开日志目录'),
                    ),
                  ],
                ],
              ),
            ),
          ),
        ),
      ),
    );
  }
}

String _generateUserId()"""
          if tail not in text:
              raise SystemExit('Could not find main() tail marker')
          text = text.replace(tail, replacement, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-windows-startup-fix.yml').unlink()

      - name: Format and commit
        run: |
          dart format lib/main.dart
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart .github/workflows/apply-windows-startup-fix.yml
          git commit -m "fix(windows): show startup UI and surface initialization errors"
          git push origin ui-redesign

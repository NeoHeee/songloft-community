name: Apply Windows Startup Fix

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/apply-windows-startup-fix.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-windows-startup-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - name: Patch Windows startup
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/main.dart')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '  WidgetsFlutterBinding.ensureInitialized();\n',
              '  WidgetsFlutterBinding.ensureInitialized();\n\n'
              '  // Windows 原生窗口可能在完整初始化前先显示。立即提交可见首帧，\n'
              '  // 避免单实例、托盘、凭据或音频插件初始化缓慢时出现纯白窗口。\n'
              '  runApp(const _NativeBootstrapApp());\n',
              1,
          )

          text = text.replace(
              '  await FileLogger.init();',
              '  try {\n'
              '    await FileLogger.init().timeout(const Duration(seconds: 3));\n'
              '  } catch (_) {\n'
              '    // 日志初始化失败不能阻止应用继续启动。\n'
              '  }',
              1,
          )

          text = text.replace(
              '  AppConfig.isTvMode = await TvDetector.isTv();',
              '  AppConfig.isTvMode = await TvDetector.isTv().timeout(\n'
              '    const Duration(seconds: 3),\n'
              '    onTimeout: () => false,\n'
              '  );',
              1,
          )

          text = text.replace(
              '      final prefs = await AppPreferences.create();\n'
              '      await prefs.migrateLegacyApiBaseUrl();',
              '      final prefs = await AppPreferences.create().timeout(\n'
              '        const Duration(seconds: 5),\n'
              '      );\n'
              '      await prefs.migrateLegacyApiBaseUrl().timeout(\n'
              '        const Duration(seconds: 5),\n'
              '      );',
              1,
          )

          text = text.replace(
              '    await SecureStorageService().getAccessToken();',
              '    await SecureStorageService().getAccessToken().timeout(\n'
              '      const Duration(seconds: 5),\n'
              '    );',
              1,
          )

          marker = '\nString _generateUserId() {'
          widget = r'''

class _NativeBootstrapApp extends StatelessWidget {
  const _NativeBootstrapApp();

  @override
  Widget build(BuildContext context) {
    const seed = Color(0xFF6750A4);
    return MaterialApp(
      title: 'Songloft',
      debugShowCheckedModeBanner: false,
      themeMode: ThemeMode.system,
      theme: ThemeData(
        useMaterial3: true,
        colorScheme: ColorScheme.fromSeed(seedColor: seed),
      ),
      darkTheme: ThemeData(
        useMaterial3: true,
        colorScheme: ColorScheme.fromSeed(
          seedColor: seed,
          brightness: Brightness.dark,
        ),
      ),
      home: const Scaffold(
        body: Center(
          child: Column(
            mainAxisSize: MainAxisSize.min,
            children: [
              _StartupMark(),
              SizedBox(height: 24),
              SizedBox(
                width: 28,
                height: 28,
                child: CircularProgressIndicator(strokeWidth: 2.6),
              ),
              SizedBox(height: 18),
              Text('正在启动 Songloft…'),
              SizedBox(height: 6),
              Text(
                '正在初始化音频与桌面服务',
                style: TextStyle(fontSize: 12),
              ),
            ],
          ),
        ),
      ),
    );
  }
}

class _StartupMark extends StatelessWidget {
  const _StartupMark();

  @override
  Widget build(BuildContext context) {
    final colors = Theme.of(context).colorScheme;
    return Container(
      width: 76,
      height: 76,
      decoration: BoxDecoration(
        gradient: LinearGradient(
          begin: Alignment.topLeft,
          end: Alignment.bottomRight,
          colors: [colors.primaryContainer, colors.tertiaryContainer],
        ),
        borderRadius: BorderRadius.circular(25),
      ),
      child: Icon(
        Icons.graphic_eq_rounded,
        size: 40,
        color: colors.primary,
      ),
    );
  }
}
'''
          if marker not in text:
              raise SystemExit('main.dart insertion marker not found')
          text = text.replace(marker, widget + marker, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-windows-startup-fix.yml').unlink()

      - name: Format and commit
        run: |
          dart format lib/main.dart
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart .github/workflows/apply-windows-startup-fix.yml
          git commit -m "fix(windows): show startup screen before plugin initialization"
          git push origin ui-redesign

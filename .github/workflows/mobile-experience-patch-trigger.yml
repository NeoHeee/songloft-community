name: Apply Mobile Experience Completion

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/mobile-experience-patch-trigger.yml'

permissions:
  contents: write

jobs:
  analyze-current-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply corrected implementation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/mobile-experience-patch-trigger-v2.yml').read_text(encoding='utf-8')
          embedded = workflow.split("          python3 <<'PY'\n", 1)[1].split("\n          PY\n", 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in embedded.splitlines()
          )
          exec(compile(script, 'mobile-experience-corrected-patch', 'exec'))
          PY
      - name: Install dependencies
        run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACM -- 'lib/**/*.dart' 'test/**/*.dart')
          dart format "${files[@]}"
      - name: Analyze
        id: analyze
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee /tmp/mobile-experience-analyze.log
      - name: Publish analyzer diagnostic
        if: steps.analyze.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          {
            echo "ANALYZE_RUN=${{ github.run_id }}"
            echo "HEAD=${{ github.event.pull_request.head.sha }}"
            cat /tmp/mobile-experience-analyze.log
          } > MOBILE_EXPERIENCE_ANALYZE_ERROR.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MOBILE_EXPERIENCE_ANALYZE_ERROR.txt
          git commit -m 'chore: capture current mobile experience analyzer errors'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1
      - name: Commit implementation
        if: steps.analyze.outcome == 'success'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test android .github/workflows/ui-redesign-check.yml
          git commit -m 'feat(mobile): complete second-stage experience polish'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: Apply Mobile Experience Completion

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/mobile-experience-patch-trigger.yml'

permissions:
  contents: write

jobs:
  validate-and-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Apply implementation and reorder migration
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          workflow = Path('.github/workflows/mobile-experience-patch-trigger-v2.yml').read_text(encoding='utf-8')
          embedded = workflow.split("          python3 <<'PY'\n", 1)[1].split("\n          PY\n", 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in embedded.splitlines()
          )
          exec(compile(script, 'mobile-experience-corrected-patch', 'exec'))

          reorder_files = [
              'lib/features/player/presentation/queue_page.dart',
              'lib/features/player/presentation/widgets/playlist_drawer.dart',
              'lib/features/playlist/presentation/playlist_detail_page.dart',
              'lib/features/playlist/presentation/playlists_page.dart',
              'lib/features/settings/presentation/servers_page.dart',
              'lib/features/settings/presentation/tab_config_page.dart',
          ]
          block_adjustment = re.compile(
              r'''\n\s*if\s*\((?:newIndex\s*>\s*oldIndex|oldIndex\s*<\s*newIndex)\)\s*\{\s*(?://[^\n]*\n\s*)?newIndex\s*(?:-=\s*1|--)\s*;\s*\}''',
              re.S,
          )
          inline_adjustment = re.compile(
              r'''\n\s*if\s*\((?:newIndex\s*>\s*oldIndex|oldIndex\s*<\s*newIndex)\)\s*newIndex\s*(?:-=\s*1|--)\s*;''',
          )
          for file_name in reorder_files:
              path = Path(file_name)
              text = path.read_text(encoding='utf-8')
              text = text.replace('onReorder:', 'onReorderItem:')
              text = block_adjustment.sub('', text)
              text = inline_adjustment.sub('', text)
              path.write_text(text, encoding='utf-8')

          tab_path = Path('lib/features/settings/presentation/tab_config_page.dart')
          tab = tab_path.read_text(encoding='utf-8')
          tab = tab.replace('onReorderItem:', 'onReorder:', 1)
          tab_path.write_text(tab, encoding='utf-8')

          provider_path = Path('lib/features/player/presentation/providers/player_provider.dart')
          provider = provider_path.read_text(encoding='utf-8').replace(
              'final insertIndex = newIndex > oldIndex ? newIndex - 1 : newIndex;',
              'final insertIndex = newIndex;',
              1,
          )
          provider_path.write_text(provider, encoding='utf-8')

          loading_path = Path('lib/shared/widgets/loading_indicator.dart')
          loading = loading_path.read_text(encoding='utf-8').replace(
              'final spacing = AppSpacing.md;',
              'const spacing = AppSpacing.md;',
              1,
          )
          loading_path.write_text(loading, encoding='utf-8')
          PY
      - name: Install dependencies
        run: flutter pub get
      - name: Format changed Dart files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACM -- 'lib/**/*.dart' 'test/**/*.dart')
          dart format "${files[@]}"
      - name: Run library tests
        run: flutter test test/features/library
      - name: Run player widget tests
        run: flutter test test/features/player/presentation/widgets
      - name: Analyze
        run: flutter analyze
      - name: Commit implementation
        shell: bash
        run: |
          branch='${{ github.event.pull_request.head.ref }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test android
          git commit -m 'feat(mobile): complete second-stage experience polish'
          git fetch origin "$branch"
          git rebase "origin/$branch"
          git push origin HEAD:"$branch"

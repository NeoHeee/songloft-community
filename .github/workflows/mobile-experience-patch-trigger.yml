name: Apply Mobile Experience Completion

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/mobile-experience-patch-trigger.yml'
      - '.github/workflows/mobile-experience-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Extract and apply embedded patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 <<'PY' 2>&1 | tee /tmp/mobile-experience-patch.log
          from pathlib import Path
          import re

          mini_path = Path('lib/features/player/presentation/widgets/mini_player.dart')
          mini = mini_path.read_text(encoding='utf-8')
          mini = re.sub(
              r"(?m)^\s+song\.artist \?\? '未知艺术家',$",
              "                                           song.artist ?? '未知艺术家',",
              mini,
              count=1,
          )
          mini = re.sub(
              r"(?m)^\s+colorScheme\n\s+\.onSurfaceVariant,$",
              "                                                     colorScheme\n                                                         .onSurfaceVariant,",
              mini,
              count=1,
          )
          mini_path.write_text(mini, encoding='utf-8')

          workflow = Path('.github/workflows/mobile-experience-patch.yml').read_text(encoding='utf-8')
          start_marker = "          python3 <<'PY'\n"
          end_marker = "\n          PY\n"
          embedded = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in embedded.splitlines()
          )
          exec(compile(script, 'mobile-experience-patch', 'exec'))

          Path('test/shared/utils/responsive_snackbar_test.dart').write_text(r'''import 'package:flutter/material.dart';
          import 'package:flutter_test/flutter_test.dart';
          import 'package:songloft_flutter/shared/utils/responsive_snackbar.dart';

          void main() {
            testWidgets('点击撤销时回调 true', (tester) async {
              bool? undone;
              await tester.pumpWidget(
                MaterialApp(
                  home: Scaffold(
                    body: Builder(
                      builder:
                          (context) => FilledButton(
                            onPressed: () {
                              ResponsiveSnackBar.showUndo(
                                context,
                                message: '已删除歌曲',
                              ).then((value) => undone = value);
                            },
                            child: const Text('删除'),
                          ),
                    ),
                  ),
                ),
              );

              await tester.tap(find.text('删除'));
              await tester.pump();
              await tester.tap(find.text('撤销'));
              await tester.pumpAndSettle();

              expect(undone, isTrue);
            });

            testWidgets('提示自然关闭时回调 false', (tester) async {
              bool? undone;
              await tester.pumpWidget(
                MaterialApp(
                  home: Scaffold(
                    body: Builder(
                      builder:
                          (context) => FilledButton(
                            onPressed: () {
                              ResponsiveSnackBar.showUndo(
                                context,
                                message: '已删除歌曲',
                                duration: const Duration(milliseconds: 100),
                              ).then((value) => undone = value);
                            },
                            child: const Text('删除'),
                          ),
                    ),
                  ),
                ),
              );

              await tester.tap(find.text('删除'));
              await tester.pump();
              await tester.pump(const Duration(seconds: 2));
              await tester.pumpAndSettle();

              expect(undone, isFalse);
            });
          }
          ''', encoding='utf-8')
          PY
      - name: Publish patch diagnostic
        if: steps.patch.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          cp /tmp/mobile-experience-patch.log MOBILE_EXPERIENCE_PATCH_ERROR.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MOBILE_EXPERIENCE_PATCH_ERROR.txt
          git commit -m 'chore: capture mobile experience patch error'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1
      - name: Install dependencies
        if: steps.patch.outcome == 'success'
        run: flutter pub get
      - name: Format changed Dart files
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACM -- 'lib/**/*.dart' 'test/**/*.dart')
          if (( ${#files[@]} > 0 )); then
            dart format "${files[@]}"
          fi
      - name: Run library tests
        id: library_tests
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter test test/features/library 2>&1 | tee /tmp/library-tests.log
      - name: Run player widget tests
        id: player_tests
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter test test/features/player/presentation/widgets 2>&1 | tee /tmp/player-tests.log
      - name: Run shared utility tests
        id: shared_tests
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter test test/shared/utils 2>&1 | tee /tmp/shared-tests.log
      - name: Analyze
        id: analyze
        if: >-
          steps.patch.outcome == 'success' &&
          steps.library_tests.outcome == 'success' &&
          steps.player_tests.outcome == 'success' &&
          steps.shared_tests.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee /tmp/analyze.log
      - name: Publish verification diagnostic
        if: >-
          steps.patch.outcome == 'success' &&
          (steps.library_tests.outcome == 'failure' ||
           steps.player_tests.outcome == 'failure' ||
           steps.shared_tests.outcome == 'failure' ||
           steps.analyze.outcome == 'failure')
        shell: bash
        run: |
          {
            echo '===== LIBRARY TESTS ====='
            cat /tmp/library-tests.log 2>/dev/null || true
            echo '===== PLAYER TESTS ====='
            cat /tmp/player-tests.log 2>/dev/null || true
            echo '===== SHARED TESTS ====='
            cat /tmp/shared-tests.log 2>/dev/null || true
            echo '===== ANALYZE ====='
            cat /tmp/analyze.log 2>/dev/null || true
          } > /tmp/mobile-experience-verification.log
          git reset --hard HEAD
          cp /tmp/mobile-experience-verification.log MOBILE_EXPERIENCE_PATCH_ERROR.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add MOBILE_EXPERIENCE_PATCH_ERROR.txt
          git commit -m 'chore: capture mobile experience verification error'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1
      - name: Commit implementation
        if: >-
          steps.patch.outcome == 'success' &&
          steps.library_tests.outcome == 'success' &&
          steps.player_tests.outcome == 'success' &&
          steps.shared_tests.outcome == 'success' &&
          steps.analyze.outcome == 'success'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test android .github/workflows/ui-redesign-check.yml
          git commit -m 'feat(mobile): complete second-stage experience polish'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

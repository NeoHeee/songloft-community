name: Apply mobile polish round 2

on:
  push:
    branches:
      - mobile-polish-round-2
    paths:
      - 'scripts/apply_mobile_polish_round_2.py'
      - 'scripts/fix_mobile_polish_round_2_lints.py'
      - '.github/workflows/apply-mobile-polish-round-2.yml'
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.ref == 'mobile-polish-round-2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-polish-round-2
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply source changes
        run: |
          python scripts/apply_mobile_polish_round_2.py
          python scripts/fix_mobile_polish_round_2_lints.py

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed sources
        run: |
          dart format \
            lib/shared/layouts/shell_layout.dart \
            lib/features/home/presentation/plugin_tab_page_native.dart \
            lib/features/player/presentation/widgets/mini_player.dart \
            lib/features/player/presentation/widgets/mobile_player.dart \
            lib/features/player/presentation/queue_page.dart

      - name: Analyze
        run: flutter analyze

      - name: Run focused tests
        run: |
          flutter test test/core/theme
          flutter test test/features/player/domain/lyric_parser_test.dart

      - name: Commit source changes
        run: |
          if git diff --quiet; then
            echo "No source change needed"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            lib/shared/layouts/shell_layout.dart \
            lib/features/home/presentation/plugin_tab_page_native.dart \
            lib/features/player/presentation/widgets/mini_player.dart \
            lib/features/player/presentation/widgets/mobile_player.dart \
            lib/features/player/presentation/queue_page.dart
          git commit -m "feat(mobile): close navigation and playback interaction loops"
          git push origin HEAD:mobile-polish-round-2

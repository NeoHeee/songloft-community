name: Apply mobile metric row

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'ui-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply layout change
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/home/presentation/home_page.dart')
          text = path.read_text(encoding='utf-8')

          old = '''                    Wrap(
                      spacing: 10,
                      runSpacing: 10,
                      children: [
                        _Metric(
                          icon: Icons.queue_music_rounded,
                          value: '$normalCount',
                          label: '歌单',
                        ),
                        _Metric(
                          icon: Icons.radio_rounded,
                          value: '$radioCount',
                          label: '电台',
                        ),
                        const _Metric(
                          icon: Icons.cloud_done_rounded,
                          value: '在线',
                          label: '音乐库',
                        ),
                      ],
                    ),
'''
          new = '''                    LayoutBuilder(
                      builder: (context, constraints) {
                        final compact = constraints.maxWidth < 600;
                        final metrics = <Widget>[
                          _Metric(
                            icon: Icons.queue_music_rounded,
                            value: '$normalCount',
                            label: '歌单',
                            compact: compact,
                          ),
                          _Metric(
                            icon: Icons.radio_rounded,
                            value: '$radioCount',
                            label: '电台',
                            compact: compact,
                          ),
                          _Metric(
                            icon: Icons.cloud_done_rounded,
                            value: '在线',
                            label: '音乐库',
                            compact: compact,
                          ),
                        ];

                        if (!compact) {
                          return Wrap(
                            spacing: 10,
                            runSpacing: 10,
                            children: metrics,
                          );
                        }

                        return Row(
                          children: [
                            for (var i = 0; i < metrics.length; i++) ...[
                              Expanded(child: metrics[i]),
                              if (i != metrics.length - 1)
                                const SizedBox(width: 8),
                            ],
                          ],
                        );
                      },
                    ),
'''
          if old not in text:
              raise RuntimeError('Metric wrap block not found')
          text = text.replace(old, new, 1)

          start = text.index('class _Metric extends StatelessWidget {')
          end = text.index('class _QuickActions extends StatelessWidget {', start)
          metric_class = '''class _Metric extends StatelessWidget {
            final IconData icon;
            final String value;
            final String label;
            final bool compact;

            const _Metric({
              required this.icon,
              required this.value,
              required this.label,
              this.compact = false,
            });

            @override
            Widget build(BuildContext context) {
              return Container(
                alignment: Alignment.center,
                padding: EdgeInsets.symmetric(
                  horizontal: compact ? 6 : 13,
                  vertical: 9,
                ),
                decoration: BoxDecoration(
                  color: Colors.black.withValues(alpha: 0.14),
                  borderRadius: BorderRadius.circular(14),
                ),
                child: FittedBox(
                  fit: BoxFit.scaleDown,
                  child: Row(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      Icon(icon, size: compact ? 16 : 17, color: Colors.white),
                      SizedBox(width: compact ? 5 : 8),
                      Text(
                        value,
                        maxLines: 1,
                        style: TextStyle(
                          color: Colors.white,
                          fontWeight: FontWeight.w800,
                          fontSize: compact ? 14 : null,
                        ),
                      ),
                      SizedBox(width: compact ? 3 : 5),
                      Text(
                        label,
                        maxLines: 1,
                        style: TextStyle(
                          color: Colors.white.withValues(alpha: 0.72),
                          fontWeight: FontWeight.w600,
                          fontSize: compact ? 14 : null,
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          '''
          text = text[:start] + metric_class + text[end:]
          path.write_text(text, encoding='utf-8')

      - name: Format and analyze
        run: |
          dart format lib/features/home/presentation/home_page.dart
          flutter pub get
          flutter analyze
          git diff --check

      - name: Commit change
        run: |
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib/features/home/presentation/home_page.dart
          git commit -m "fix(home): keep dashboard metrics on one mobile row"
          git push origin HEAD:ui-redesign

name: Apply playlist and mobile navigation follow-up from PR

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/kick-playlist-mobile-nav-followup.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/kick-playlist-mobile-nav-followup.yml'

permissions:
  contents: write

jobs:
  apply-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0
          show-progress: false

      - name: Extract and apply prepared patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/apply-playlist-mobile-nav-followup.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY\n", start)
          script = dedent(text[start:end])
          Path('/tmp/apply-followup.py').write_text(script, encoding='utf-8')
          print(f'Extracted {len(script.splitlines())} patch lines')
          PY

          set +e
          python /tmp/apply-followup.py > /tmp/followup-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/followup-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/followup-patch.log .github/followup-patch-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/followup-patch-error.log
            git commit -m "chore(ci): capture follow-up patch failure"
            git push origin ui-redesign
            exit "$status"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Format updated Dart sources
        run: |
          dart format \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/providers/playlist_provider.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/shared/layouts/active_destinations.dart \
            lib/shared/layouts/adaptive_scaffold.dart

      - name: Commit follow-up and remove one-shot workflows
        shell: bash
        run: |
          rm -f \
            .github/followup-patch-error.log \
            .github/workflows/apply-playlist-mobile-nav-followup.yml \
            .github/workflows/kick-playlist-mobile-nav-followup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No follow-up changes were needed"
            exit 0
          fi
          git commit -m "feat(ui): add playlist search and compact mobile navigation [platform-build]"
          git push origin ui-redesign

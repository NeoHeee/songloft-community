name: Export playlist and mobile navigation follow-up

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/kick-playlist-mobile-nav-followup.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/kick-playlist-mobile-nav-followup.yml'

permissions:
  contents: read

jobs:
  export-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Clone branch and apply prepared patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --quiet --branch ui-redesign \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" source
          cd source
          python scripts/run-followup-patch.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Format updated Dart sources
        working-directory: source
        run: |
          dart format \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/providers/playlist_provider.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/shared/layouts/active_destinations.dart \
            lib/shared/layouts/adaptive_scaffold.dart

      - name: Upload formatted source files
        uses: actions/upload-artifact@v4
        with:
          name: playlist-mobile-nav-followup-sources
          path: |
            source/lib/features/playlist/presentation/playlists_page.dart
            source/lib/features/playlist/presentation/providers/playlist_provider.dart
            source/lib/features/jsplugin/presentation/widgets/plugin_icon.dart
            source/lib/shared/layouts/active_destinations.dart
            source/lib/shared/layouts/adaptive_scaffold.dart
          if-no-files-found: error
          retention-days: 7

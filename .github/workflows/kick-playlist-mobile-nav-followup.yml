name: Apply playlist and mobile navigation follow-up from PR

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/kick-playlist-mobile-nav-followup.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/kick-playlist-mobile-nav-followup.yml'

permissions:
  contents: write

jobs:
  apply-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Clone branch and apply prepared patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --quiet --branch ui-redesign \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" source
          cd source
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/apply-playlist-mobile-nav-followup.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY\n", start)
          lines = dedent(text[start:end]).splitlines()

          def leading_spaces(value: str) -> int:
              return len(value) - len(value.lstrip(' '))

          index = 0
          while index < len(lines):
              line = lines[index]
              marker_index = line.find('"""')
              if marker_index < 0:
                  index += 1
                  continue

              first_content = line[marker_index + 3:]
              if not first_content or '"""' in first_content:
                  index += 1
                  continue

              close_index = index + 1
              while close_index < len(lines) and '"""' not in lines[close_index]:
                  close_index += 1
              if close_index >= len(lines):
                  raise SystemExit(f'Unclosed triple-quoted block at patch line {index + 1}')

              content_indices = [
                  current
                  for current in range(index + 1, close_index)
                  if lines[current].strip()
              ]
              if content_indices:
                  base_indent = leading_spaces(first_content)
                  first_code = first_content.strip()
                  nested = first_code.endswith(('{', '[', '('))
                  target_minimum = base_indent + (2 if nested else 0)
                  current_minimum = min(
                      leading_spaces(lines[current]) for current in content_indices
                  )
                  delta = max(0, target_minimum - current_minimum)
                  if delta:
                      for current in content_indices:
                          lines[current] = (' ' * delta) + lines[current]

              index = close_index + 1

          script = '\n'.join(lines) + '\n'
          Path('/tmp/apply-followup.py').write_text(script, encoding='utf-8')
          print(f'Extracted and normalized {len(lines)} patch lines')
          PY
          python /tmp/apply-followup.py

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Format updated Dart sources
        working-directory: source
        run: |
          dart format \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/providers/playlist_provider.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/shared/layouts/active_destinations.dart \
            lib/shared/layouts/adaptive_scaffold.dart

      - name: Commit follow-up and remove one-shot workflows
        working-directory: source
        shell: bash
        run: |
          rm -f \
            .github/followup-patch-error.log \
            .github/workflows/apply-playlist-mobile-nav-followup.yml \
            .github/workflows/kick-playlist-mobile-nav-followup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No follow-up changes were needed"
            exit 0
          fi
          git commit -m "feat(ui): add playlist search and compact mobile navigation [platform-build]"
          git push origin ui-redesign

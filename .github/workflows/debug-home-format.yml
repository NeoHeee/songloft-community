name: Debug home page formatting

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/debug-home-format.yml'
      - 'lib/features/home/presentation/home_page.dart'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Reproduce formatting check
        shell: bash
        run: |
          set -euo pipefail
          base_sha='${{ github.event.pull_request.base.sha }}'
          head_sha='${{ github.event.pull_request.head.sha }}'
          mapfile -t dart_files < <(
            git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )
          printf '%s\n' "${dart_files[@]}" > changed-dart-files.txt
          dart format "${dart_files[@]}" > formatter-output.txt 2>&1 || true
          git status --short > formatter-status.txt
          git diff -- "${dart_files[@]}" > formatter.patch

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: home-format-diagnostic
          path: |
            changed-dart-files.txt
            formatter-output.txt
            formatter-status.txt
            formatter.patch
          if-no-files-found: error
          retention-days: 2

name: Apply TV login round

on:
  pull_request:
    branches: [tv-third-round]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'tv-fourth-round-login'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout TV login branch
        uses: actions/checkout@v4
        with:
          ref: tv-fourth-round-login
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply TV login patch
        id: apply_patch
        shell: bash
        run: |
          set +e
          python tool/apply_tv_login_round.py > tv-login-patch.log 2>&1
          status=$?
          cat tv-login-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-login-patch-log
          path: tv-login-patch.log
          retention-days: 7

      - name: Stop when patch failed
        if: steps.apply_patch.outputs.status != '0'
        run: exit 1

      - name: Apply login focus follow-up fixes
        run: python tool/fix_tv_login_followup.py

      - name: Format login page
        run: dart format lib/features/auth/presentation/login_page.dart

      - name: Analyze
        run: flutter analyze

      - name: Commit TV login changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/auth/presentation/login_page.dart
          if git diff --cached --quiet; then
            echo "No TV login changes to commit"
          else
            git commit -m "feat(tv): optimize login and server selection"
            git push origin HEAD:tv-fourth-round-login
          fi

      - name: Build Android release APKs
        id: android_build
        shell: bash
        run: |
          set +e
          flutter build apk --release --split-per-abi > tv-login-build.log 2>&1
          status=$?
          cat tv-login-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-login-build-log
          path: tv-login-build.log
          retention-days: 7

      - name: Upload APKs
        if: steps.android_build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-login-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30

      - name: Fail when Android build failed
        if: steps.android_build.outputs.status != '0'
        run: exit 1

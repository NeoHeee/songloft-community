name: Apply desktop home hero layout

on:
  push:
    branches:
      - fix/desktop-home-hero-layout
    paths:
      - '.github/workflows/apply-desktop-home-hero-layout.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-home-hero-layout
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply and format layout change
        run: |
          python scripts/apply-desktop-home-hero-layout.py
          dart format lib/features/home/presentation/home_page.dart

      - name: Commit patched source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/features/home/presentation/home_page.dart
          git diff --cached --exit-code && { echo 'No source changes produced'; exit 1; } || true
          git commit -m 'fix(home): compact desktop hero layout'
          git push origin HEAD:fix/desktop-home-hero-layout

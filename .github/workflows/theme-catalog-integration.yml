name: Integrate theme catalog

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/theme-catalog-integration.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/theme-catalog-integration.yml'

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Apply catalog integration
        run: python scripts/apply-theme-catalog.py
      - name: Install dependencies
        run: flutter pub get
      - name: Format sources
        run: dart format lib test
      - name: Run theme system tests
        run: flutter test test/core/theme
      - name: Analyze
        run: flutter analyze
      - name: Commit catalog integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test pubspec.yaml .github/workflows/ui-redesign-check.yml
          if git diff --cached --quiet; then
            echo "No integration changes"
            exit 0
          fi
          git commit -m "feat(theme): integrate verified online catalog [platform-build]"
          git push origin ui-redesign

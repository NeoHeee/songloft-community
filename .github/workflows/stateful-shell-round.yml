name: Stateful shell navigation round

on:
  push:
    branches:
      - mobile-stateful-shell
    paths:
      - 'lib/core/router/app_router.dart'
      - 'lib/shared/layouts/shell_layout.dart'
      - '.github/workflows/stateful-shell-round.yml'
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  validate-build:
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.ref == 'mobile-stateful-shell'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-stateful-shell
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format navigation sources
        run: |
          dart format \
            lib/core/router/app_router.dart \
            lib/shared/layouts/shell_layout.dart

      - name: Analyze
        run: flutter analyze

      - name: Run focused tests
        run: |
          flutter test test/core/theme
          flutter test test/features/player/domain/lyric_parser_test.dart

      - name: Build Android release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Web release
        run: flutter build web --release --base-href /

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: songloft-stateful-shell-android
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14
          if-no-files-found: error

      - name: Commit formatter changes
        shell: bash
        run: |
          if git diff --quiet -- \
            lib/core/router/app_router.dart \
            lib/shared/layouts/shell_layout.dart; then
            echo "Navigation sources already formatted"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            lib/core/router/app_router.dart \
            lib/shared/layouts/shell_layout.dart
          git commit -m "style(nav): normalize stateful shell sources"
          git push origin HEAD:mobile-stateful-shell

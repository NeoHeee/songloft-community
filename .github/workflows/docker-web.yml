name: Docker Web Player

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'fonts/**'
      - 'pubspec.yaml'
      - 'docker/web/**'
      - 'docker-compose.web.yml'
      - '.github/workflows/docker-web.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'fonts/**'
      - 'pubspec.yaml'
      - 'docker/web/**'
      - 'docker-compose.web.yml'
      - '.github/workflows/docker-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Web image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Resolve image and version metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          owner=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          version=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          build_time=$(date -u +'%Y-%m-%d_%H:%M:%S')
          echo "image=ghcr.io/${owner}/songloft-community-web" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build embedded-mode Flutter Web player
        shell: bash
        run: |
          set -euo pipefail
          cat > web/deploy-mode.js <<'EOF'
          // Generated by Docker Web Player workflow.
          var _deployMode = 'embedded';
          EOF
          flutter build web --release --base-href / \
            --dart-define=DEPLOY_MODE=embedded \
            --dart-define=FRONTEND_VERSION=${{ steps.vars.outputs.version }} \
            --dart-define=FRONTEND_BUILD_TIME=${{ steps.vars.outputs.build_time }}

          # Keep /favicon.png as a branded compatibility fallback for browsers
          # that request it even when explicit rel=icon tags are present.
          cp build/web/icons/Icon-192.png build/web/favicon.png

          test -f build/web/index.html
          test -f build/web/main.dart.js
          grep -q "_deployMode = 'embedded'" build/web/deploy-mode.js
          grep -q 'icons/Icon-192.png?v=community-2' build/web/index.html
          cmp build/web/favicon.png build/web/icons/Icon-192.png

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.vars.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=ci,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Songloft Community Web
            org.opencontainers.image.description=Docker-ready Songloft Community Web player
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          image='${{ steps.vars.outputs.image }}:ci'
          docker run -d --name songloft-web-smoke \
            -e SONGLOFT_API_URL=http://127.0.0.1:58091 \
            -p 18080:80 \
            "$image"
          trap 'docker logs songloft-web-smoke || true; docker rm -f songloft-web-smoke >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/healthz | grep -q '^ok$'; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              echo 'Container health check did not become ready.' >&2
              exit 1
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:18080/ | grep -q 'Songloft Community'
          curl --fail --silent http://127.0.0.1:18080/ | grep -q 'icons/Icon-192.png?v=community-2'
          curl --fail --silent http://127.0.0.1:18080/icons/Icon-192.png -o /tmp/community-icon.png
          curl --fail --silent http://127.0.0.1:18080/favicon.png -o /tmp/community-favicon.png
          cmp /tmp/community-icon.png /tmp/community-favicon.png
          docker exec songloft-web-smoke nginx -t

name: Eighth Round Navigation Patch

on:
  push:
    branches:
      - mobile-eighth-round
    paths:
      - '.github/workflows/eighth-round-navigation-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-eighth-round
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Apply navigation patch
        run: python3 tool/eighth_round_navigation_patch.py
      - name: Format changed Dart files
        run: dart format lib/core/navigation/mobile_back_policy.dart lib/shared/layouts/shell_layout.dart lib/features/library/presentation/mobile_library_page.dart lib/features/playlist/presentation/playlists_page.dart lib/features/playlist/presentation/playlist_detail_page.dart lib/features/settings/presentation/settings_page.dart lib/features/auth/presentation/login_page.dart lib/features/home/presentation/plugin_webview_page_native.dart test/core/navigation/mobile_back_policy_test.dart
      - name: Install dependencies
        run: flutter pub get
      - name: Run navigation tests
        run: flutter test test/core/navigation
      - name: Analyze
        run: flutter analyze
      - name: Commit patched sources
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test .github/workflows/ui-redesign-check.yml
          git commit -m 'fix(nav): unify mobile back behavior'
          git push origin HEAD:mobile-eighth-round

# Synchronize the stacked PR so the bootstrap workflow on its base can run.
# Diagnostic rerun requested after the first exact-match failure.
# Source and tests will now be committed separately from CI workflow changes.

name: Build refreshed Android APKs

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/build-android-now.yml'
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: read

jobs:
  build-android:
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.ref == 'ui-redesign'
    name: Build Android release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout redesigned player
        uses: actions/checkout@v4
        with:
          ref: ui-redesign

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run theme tests
        run: flutter test test/core/theme

      - name: Analyze source
        run: flutter analyze

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi

      - name: List APKs
        run: ls -lh build/app/outputs/flutter-apk/*-release.apk

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: songloft-android-ui-redesign-latest
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14
          if-no-files-found: error

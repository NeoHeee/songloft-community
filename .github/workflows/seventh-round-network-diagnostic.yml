name: Seventh Round Network Diagnostic

on:
  pull_request:
    branches:
      - mobile-sixth-round
    paths:
      - 'lib/core/network/**'
      - 'test/core/network/**'
      - '.github/workflows/seventh-round-network-diagnostic.yml'

permissions:
  contents: read

jobs:
  network-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Capture network test output
        id: network-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter test test/core/network 2>&1 | tee /tmp/network-test.log
      - name: Upload network test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seventh-round-network-test-log
          path: /tmp/network-test.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when network test failed
        if: steps.network-test.outcome == 'failure'
        run: exit 1

name: Export Android Signing Keys

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Export keystore and credentials
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p export
          echo "$ANDROID_KEYSTORE_BASE64" > export/keystore_base64.txt
          echo "$ANDROID_KEYSTORE_PASSWORD" > export/keystore_password.txt
          echo "$ANDROID_KEY_ALIAS" > export/key_alias.txt
          echo "$ANDROID_KEY_PASSWORD" > export/key_password.txt

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-keys
          path: export/
          retention-days: 1

name: Apply home mobile polish v2

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'ui-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply requested source changes
        shell: python
        run: |
          from pathlib import Path

          prefs_path = Path('lib/core/storage/app_preferences.dart')
          prefs = prefs_path.read_text(encoding='utf-8')
          if '_hiddenHomePluginEntriesKey' not in prefs:
              anchor = "  static const _sourcePlaylistIdKey = 'player_source_playlist_id';\n"
              if anchor not in prefs:
                  raise RuntimeError('AppPreferences key anchor not found')
              prefs = prefs.replace(
                  anchor,
                  anchor
                  + "  static const _hiddenHomePluginEntriesKey =\n"
                  + "      'hidden_home_plugin_entries';\n",
                  1,
              )

          if 'getHiddenHomePluginEntries' not in prefs:
              marker = '  /// 清除所有偏好设置\n'
              if marker not in prefs:
                  raise RuntimeError('AppPreferences method anchor not found')
              methods = '''  /// 获取首页隐藏的插件入口。使用 entryPath 而不是数据库 ID，
          /// 确保插件更新或重新安装后仍能保留用户选择。
          Set<String> getHiddenHomePluginEntries() {
            final entries =
                _prefs.getStringList(_hiddenHomePluginEntriesKey) ??
                const <String>[];
            return entries
                .map((entry) => entry.trim())
                .where((entry) => entry.isNotEmpty)
                .toSet();
          }

          /// 保存首页隐藏的插件入口。排序后写入，避免无意义的顺序变化。
          Future<bool> setHiddenHomePluginEntries(Set<String> entryPaths) {
            final entries =
                entryPaths
                    .map((entry) => entry.trim())
                    .where((entry) => entry.isNotEmpty)
                    .toSet()
                    .toList()
                  ..sort();
            return _prefs.setStringList(_hiddenHomePluginEntriesKey, entries);
          }

          '''
              prefs = prefs.replace(marker, methods + marker, 1)
          prefs_path.write_text(prefs, encoding='utf-8')

          home_path = Path('lib/features/home/presentation/home_page.dart')
          home = home_path.read_text(encoding='utf-8')
          if 'child: FittedBox(\n                        fit: BoxFit.scaleDown' not in home:
              start_marker = "                    Text(\n                      _greeting(),"
              end_marker = '                    const SizedBox(height: 8),\n'
              start = home.find(start_marker)
              end = home.find(end_marker, start)
              if start < 0 or end < 0:
                  raise RuntimeError('Greeting block not found')
              replacement = '''                    SizedBox(
            width: double.infinity,
            child: FittedBox(
              fit: BoxFit.scaleDown,
              alignment: Alignment.centerLeft,
              child: Text(
                _greeting(),
                maxLines: 1,
                softWrap: false,
                style: theme.textTheme.displaySmall?.copyWith(
                  color: Colors.white,
                  fontWeight: FontWeight.w800,
                  letterSpacing: -1.1,
                  fontSize: isWide ? 42 : 31,
                ),
              ),
            ),
          ),
'''
              home = home[:start] + replacement + home[end:]
          home_path.write_text(home, encoding='utf-8')

          grid_path = Path(
              'lib/features/jsplugin/presentation/widgets/jsplugin_grid.dart'
          )
          grid_path.write_text(r'''import 'package:flutter/foundation.dart' show kIsWeb;
          import 'package:flutter/material.dart';
          import 'package:flutter_riverpod/flutter_riverpod.dart';
          import 'package:go_router/go_router.dart';
          import 'package:url_launcher/url_launcher.dart';

          import '../../../../config/app_config.dart';
          import '../../../../core/router/app_router.dart';
          import '../../../../core/storage/app_preferences.dart';
          import '../../../../core/storage/secure_storage.dart';
          import '../../../../core/theme/responsive.dart';
          import '../../data/jsplugin_api.dart';
          import '../providers/jsplugin_provider.dart';
          import 'plugin_icon.dart';

          /// 首页插件入口隐藏状态。仅控制首页展示，不改变插件启用状态。
          final homePluginHiddenEntriesProvider =
              AsyncNotifierProvider<HomePluginHiddenEntriesNotifier, Set<String>>(
                HomePluginHiddenEntriesNotifier.new,
              );

          class HomePluginHiddenEntriesNotifier extends AsyncNotifier<Set<String>> {
            @override
            Future<Set<String>> build() async {
              final prefs = await AppPreferences.create();
              return prefs.getHiddenHomePluginEntries();
            }

            Future<void> setVisible(
              String entryPath, {
              required bool visible,
            }) async {
              final current = state.value ?? const <String>{};
              final next = <String>{...current};
              if (visible) {
                next.remove(entryPath);
              } else {
                next.add(entryPath);
              }
              state = AsyncData(next);
              final prefs = await AppPreferences.create();
              await prefs.setHiddenHomePluginEntries(next);
            }

            Future<void> showAll() async {
              state = const AsyncData<Set<String>>(<String>{});
              final prefs = await AppPreferences.create();
              await prefs.setHiddenHomePluginEntries(const <String>{});
            }
          }

          /// JS 插件快捷入口网格
          class JSPluginGrid extends ConsumerWidget {
            const JSPluginGrid({super.key});

            @override
            Widget build(BuildContext context, WidgetRef ref) {
              final pluginsAsync = ref.watch(jsPluginsProvider);
              final hiddenEntriesAsync = ref.watch(
                homePluginHiddenEntriesProvider,
              );

              return pluginsAsync.when(
                data: (plugins) {
                  final activePlugins =
                      plugins
                          .where(
                            (plugin) =>
                                plugin.isActive &&
                                plugin.entryPath != null &&
                                plugin.entryPath!.isNotEmpty,
                          )
                          .toList();

                  if (activePlugins.isEmpty) {
                    return const SizedBox.shrink();
                  }

                  final hiddenEntries =
                      hiddenEntriesAsync.value ?? const <String>{};
                  final visiblePlugins =
                      activePlugins
                          .where(
                            (plugin) =>
                                !hiddenEntries.contains(plugin.entryPath),
                          )
                          .toList();
                  final theme = Theme.of(context);
                  final colorScheme = theme.colorScheme;

                  return Container(
                    padding: const EdgeInsets.fromLTRB(16, 16, 16, 18),
                    decoration: BoxDecoration(
                      color: colorScheme.surfaceContainerLow,
                      borderRadius: BorderRadius.circular(24),
                      border: Border.all(
                        color: colorScheme.outlineVariant.withValues(alpha: 0.24),
                      ),
                    ),
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        Row(
                          children: [
                            Container(
                              width: 42,
                              height: 42,
                              decoration: BoxDecoration(
                                color: colorScheme.tertiaryContainer.withValues(
                                  alpha: 0.72,
                                ),
                                borderRadius: BorderRadius.circular(14),
                              ),
                              child: Icon(
                                Icons.extension_rounded,
                                color: colorScheme.tertiary,
                              ),
                            ),
                            const SizedBox(width: 12),
                            Expanded(
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  Text(
                                    '插件快捷入口',
                                    style: theme.textTheme.titleMedium?.copyWith(
                                      fontWeight: FontWeight.w700,
                                    ),
                                  ),
                                  Text(
                                    '${visiblePlugins.length} 个显示 · ${activePlugins.length} 个已启用',
                                    style: theme.textTheme.bodySmall?.copyWith(
                                      color: colorScheme.onSurfaceVariant,
                                    ),
                                  ),
                                ],
                              ),
                            ),
                            IconButton.filledTonal(
                              tooltip: '选择快捷入口',
                              onPressed:
                                  () => _showVisibilitySheet(
                                    context,
                                    activePlugins,
                                  ),
                              icon: const Icon(Icons.tune_rounded),
                            ),
                          ],
                        ),
                        const SizedBox(height: 16),
                        if (visiblePlugins.isEmpty)
                          Container(
                            width: double.infinity,
                            padding: const EdgeInsets.symmetric(
                              horizontal: 16,
                              vertical: 22,
                            ),
                            decoration: BoxDecoration(
                              color: colorScheme.surfaceContainerHighest.withValues(
                                alpha: 0.42,
                              ),
                              borderRadius: BorderRadius.circular(18),
                            ),
                            child: Column(
                              children: [
                                Icon(
                                  Icons.visibility_off_rounded,
                                  color: colorScheme.onSurfaceVariant,
                                ),
                                const SizedBox(height: 8),
                                Text(
                                  '已隐藏全部快捷入口',
                                  style: theme.textTheme.bodyMedium?.copyWith(
                                    fontWeight: FontWeight.w700,
                                  ),
                                ),
                                const SizedBox(height: 3),
                                Text(
                                  '点击右上角调节按钮可重新显示',
                                  style: theme.textTheme.bodySmall?.copyWith(
                                    color: colorScheme.onSurfaceVariant,
                                  ),
                                ),
                              ],
                            ),
                          )
                        else
                          LayoutBuilder(
                            builder: (context, constraints) {
                              final width = constraints.maxWidth;
                              final int crossAxisCount;
                              if (context.isMobile ||
                                  width < ResponsiveBreakpoints.tablet) {
                                crossAxisCount = (width / 104).floor().clamp(2, 4);
                              } else if (width < ResponsiveBreakpoints.desktop) {
                                crossAxisCount = (width / 128).floor().clamp(4, 5);
                              } else {
                                crossAxisCount = (width / 150).floor().clamp(4, 7);
                              }

                              return GridView.builder(
                                shrinkWrap: true,
                                physics: const NeverScrollableScrollPhysics(),
                                gridDelegate:
                                    SliverGridDelegateWithFixedCrossAxisCount(
                                      crossAxisCount: crossAxisCount,
                                      mainAxisSpacing: 10,
                                      crossAxisSpacing: 10,
                                      childAspectRatio: 0.95,
                                    ),
                                itemCount: visiblePlugins.length,
                                itemBuilder: (context, index) {
                                  return _JSPluginCard(
                                    plugin: visiblePlugins[index],
                                  );
                                },
                              );
                            },
                          ),
                      ],
                    ),
                  );
                },
                loading: () => const SizedBox.shrink(),
                error: (_, _) => const SizedBox.shrink(),
              );
            }

            void _showVisibilitySheet(
              BuildContext context,
              List<JSPlugin> plugins,
            ) {
              showModalBottomSheet<void>(
                context: context,
                isScrollControlled: true,
                showDragHandle: true,
                builder: (_) => _PluginVisibilitySheet(plugins: plugins),
              );
            }
          }

          class _PluginVisibilitySheet extends ConsumerWidget {
            final List<JSPlugin> plugins;

            const _PluginVisibilitySheet({required this.plugins});

            @override
            Widget build(BuildContext context, WidgetRef ref) {
              final theme = Theme.of(context);
              final colorScheme = theme.colorScheme;
              final hiddenEntriesAsync = ref.watch(
                homePluginHiddenEntriesProvider,
              );
              final hiddenEntries =
                  hiddenEntriesAsync.value ?? const <String>{};

              return SafeArea(
                child: FractionallySizedBox(
                  heightFactor: 0.72,
                  child: Column(
                    children: [
                      Padding(
                        padding: const EdgeInsets.fromLTRB(20, 4, 12, 12),
                        child: Row(
                          children: [
                            Expanded(
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  Text(
                                    '选择首页快捷入口',
                                    style: theme.textTheme.titleLarge?.copyWith(
                                      fontWeight: FontWeight.w800,
                                    ),
                                  ),
                                  const SizedBox(height: 4),
                                  Text(
                                    '隐藏后插件仍保持启用，可随时重新显示',
                                    style: theme.textTheme.bodySmall?.copyWith(
                                      color: colorScheme.onSurfaceVariant,
                                    ),
                                  ),
                                ],
                              ),
                            ),
                            TextButton(
                              onPressed:
                                  hiddenEntries.isEmpty
                                      ? null
                                      : () =>
                                          ref
                                              .read(
                                                homePluginHiddenEntriesProvider
                                                    .notifier,
                                              )
                                              .showAll(),
                              child: const Text('全部显示'),
                            ),
                          ],
                        ),
                      ),
                      const Divider(height: 1),
                      Expanded(
                        child: ListView.separated(
                          padding: const EdgeInsets.symmetric(vertical: 8),
                          itemCount: plugins.length,
                          separatorBuilder:
                              (_, _) => const Divider(
                                height: 1,
                                indent: 76,
                              ),
                          itemBuilder: (context, index) {
                            final plugin = plugins[index];
                            final entryPath = plugin.entryPath!;
                            final visible = !hiddenEntries.contains(entryPath);
                            return SwitchListTile(
                              value: visible,
                              onChanged:
                                  hiddenEntriesAsync.isLoading
                                      ? null
                                      : (value) =>
                                          ref
                                              .read(
                                                homePluginHiddenEntriesProvider
                                                    .notifier,
                                              )
                                              .setVisible(
                                                entryPath,
                                                visible: value,
                                              ),
                              contentPadding: const EdgeInsets.symmetric(
                                horizontal: 20,
                                vertical: 2,
                              ),
                              secondary: Container(
                                width: 44,
                                height: 44,
                                decoration: BoxDecoration(
                                  color: colorScheme.surfaceContainerHighest,
                                  borderRadius: BorderRadius.circular(14),
                                ),
                                alignment: Alignment.center,
                                child: PluginIcon(
                                  iconUrl: plugin.iconUrl,
                                  displayName: plugin.displayName,
                                  size: 34,
                                ),
                              ),
                              title: Text(
                                plugin.displayName,
                                maxLines: 1,
                                overflow: TextOverflow.ellipsis,
                              ),
                              subtitle:
                                  plugin.version == null || plugin.version!.isEmpty
                                      ? const Text('已启用')
                                      : Text('版本 ${plugin.version}'),
                            );
                          },
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class _JSPluginCard extends StatelessWidget {
            final JSPlugin plugin;

            const _JSPluginCard({required this.plugin});

            @override
            Widget build(BuildContext context) {
              final theme = Theme.of(context);
              final colorScheme = theme.colorScheme;

              return Material(
                color: colorScheme.surfaceContainerHighest.withValues(alpha: 0.58),
                borderRadius: BorderRadius.circular(18),
                clipBehavior: Clip.antiAlias,
                child: InkWell(
                  onTap: () => _openPlugin(context),
                  child: Padding(
                    padding: const EdgeInsets.fromLTRB(10, 13, 10, 10),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Container(
                          width: 58,
                          height: 58,
                          decoration: BoxDecoration(
                            color: colorScheme.surface,
                            borderRadius: BorderRadius.circular(18),
                            boxShadow: [
                              BoxShadow(
                                color: Colors.black.withValues(alpha: 0.08),
                                blurRadius: 12,
                                offset: const Offset(0, 5),
                              ),
                            ],
                          ),
                          alignment: Alignment.center,
                          child: PluginIcon(
                            iconUrl: plugin.iconUrl,
                            displayName: plugin.displayName,
                            size: 46,
                          ),
                        ),
                        const SizedBox(height: 10),
                        Text(
                          plugin.displayName,
                          maxLines: 2,
                          overflow: TextOverflow.ellipsis,
                          textAlign: TextAlign.center,
                          style: theme.textTheme.bodySmall?.copyWith(
                            fontWeight: FontWeight.w700,
                          ),
                        ),
                        if (plugin.version != null) ...[
                          const SizedBox(height: 4),
                          Text(
                            'v${plugin.version}',
                            style: theme.textTheme.labelSmall?.copyWith(
                              color: colorScheme.onSurfaceVariant,
                            ),
                          ),
                        ],
                      ],
                    ),
                  ),
                ),
              );
            }

            void _openPlugin(BuildContext context) {
              if (plugin.entryPath == null || plugin.entryPath!.isEmpty) {
                return;
              }

              final url =
                  '${AppConfig.baseUrl}${AppConfig.basePath}/api/v1/jsplugin/${plugin.entryPath}';
              final theme =
                  Theme.of(context).brightness == Brightness.dark ? 'dark' : 'light';

              if (kIsWeb) {
                final token = SecureStorageService.cachedAccessToken ?? '';
                final params = <String>['theme=$theme'];
                if (token.isNotEmpty) params.add('access_token=$token');
                final webUrl = Uri.parse('$url?${params.join('&')}');
                launchUrl(webUrl, mode: LaunchMode.externalApplication);
              } else {
                context.push(
                  Uri(
                    path: AppRoutes.plugin,
                    queryParameters: {'url': url, 'name': plugin.displayName},
                  ).toString(),
                );
              }
            }
          }
          ''', encoding='utf-8')

      - name: Format and validate
        run: |
          dart format \
            lib/core/storage/app_preferences.dart \
            lib/features/home/presentation/home_page.dart \
            lib/features/jsplugin/presentation/widgets/jsplugin_grid.dart
          flutter pub get
          flutter analyze
          git diff --check

      - name: Commit changes
        run: |
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            lib/core/storage/app_preferences.dart \
            lib/features/home/presentation/home_page.dart \
            lib/features/jsplugin/presentation/widgets/jsplugin_grid.dart
          git commit -m "feat(home): customize plugin shortcuts and keep greeting on one line"
          git push origin HEAD:ui-redesign

name: Apply Playlist Action Layout Fix

# Re-trigger after the workflow file exists on the branch.
on:
  push:
    branches:
      - mobile-experience-completion
    paths:
      - '.github/workflows/fix-playlist-actions-inline.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Keep playlist actions on one row
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/features/playlist/presentation/playlist_detail_page.dart')
          source = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r"  Widget _buildWorkspaceHeader\([\s\S]*?\n  Widget _buildPrimaryActions",
          )
          replacement = r'''  Widget _buildWorkspaceHeader(
    BuildContext context,
    Playlist playlist,
    AsyncValue<PaginatedSongsState> songsAsync, {
    required bool showPrimaryActions,
  }) {
    final theme = Theme.of(context);
    final colorScheme = theme.colorScheme;
    final state = songsAsync.value;
    final songs = state?.items ?? [];

    return Padding(
      padding: const EdgeInsets.fromLTRB(14, 14, 14, 4),
      child: Container(
        padding: const EdgeInsets.all(12),
        decoration: BoxDecoration(
          color: colorScheme.surfaceContainerLow,
          borderRadius: BorderRadius.circular(20),
          border: Border.all(
            color: colorScheme.outlineVariant.withValues(alpha: 0.22),
          ),
        ),
        child: LayoutBuilder(
          builder: (context, constraints) {
            final compact = constraints.maxWidth < 700;
            final showActions = !_isSortMode && !_isSelectMode;
            final actions = Wrap(
              spacing: 8,
              runSpacing: 8,
              crossAxisAlignment: WrapCrossAlignment.center,
              children: [
                if (showPrimaryActions && showActions) ...[
                  FilledButton.icon(
                    onPressed: songs.isEmpty
                        ? null
                        : () => _playAll(playlist, songs),
                    icon: const Icon(Icons.play_arrow_rounded),
                    label: const Text('播放全部'),
                  ),
                  OutlinedButton.icon(
                    onPressed: _addSongs,
                    icon: const Icon(Icons.add_rounded),
                    label: const Text('添加歌曲'),
                  ),
                ],
                if (showActions) _buildSortButton(state, songs),
                if (showActions && songs.isNotEmpty)
                  IconButton.filledTonal(
                    onPressed: _enterSelectMode,
                    icon: const Icon(Icons.checklist_rounded),
                    tooltip: '多选歌曲',
                  ),
              ],
            );

            final title = Column(
              crossAxisAlignment: CrossAxisAlignment.start,
              children: [
                Text(
                  _isSortMode
                      ? '调整歌曲顺序'
                      : _isSelectMode
                      ? '已选择 ${_selectedSongIds.length} 首'
                      : '歌曲列表',
                  style: theme.textTheme.titleMedium?.copyWith(
                    fontWeight: FontWeight.w800,
                  ),
                ),
                const SizedBox(height: 2),
                Text(
                  state == null
                      ? '正在读取歌单内容'
                      : state.keyword.isEmpty
                      ? '共 ${state.total} 首，可搜索、排序或批量管理'
                      : '搜索“${state.keyword}”，找到 ${state.total} 首',
                  maxLines: 1,
                  overflow: TextOverflow.ellipsis,
                  style: theme.textTheme.bodySmall?.copyWith(
                    color: colorScheme.onSurfaceVariant,
                  ),
                ),
              ],
            );

            if (compact) {
              return Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  title,
                  if (showActions) ...[
                    const SizedBox(height: 10),
                    if (showPrimaryActions)
                      _buildCompactPlaylistActions(playlist, state, songs)
                    else if (actions.children.isNotEmpty)
                      actions,
                  ],
                ],
              );
            }

            return Row(
              children: [
                Expanded(child: title),
                actions,
              ],
            );
          },
        ),
      ),
    );
  }

  Widget _buildCompactPlaylistActions(
    Playlist playlist,
    PaginatedSongsState? state,
    List<Song> songs,
  ) {
    final compactButtonStyle = ButtonStyle(
      minimumSize: const WidgetStatePropertyAll(Size(0, 48)),
      padding: const WidgetStatePropertyAll(
        EdgeInsets.symmetric(horizontal: 8),
      ),
      visualDensity: VisualDensity.compact,
    );

    return Row(
      children: [
        Expanded(
          child: FilledButton.icon(
            onPressed: songs.isEmpty ? null : () => _playAll(playlist, songs),
            style: compactButtonStyle,
            icon: const Icon(Icons.play_arrow_rounded, size: 20),
            label: const FittedBox(
              fit: BoxFit.scaleDown,
              child: Text('播放全部', maxLines: 1),
            ),
          ),
        ),
        const SizedBox(width: 6),
        Expanded(
          child: OutlinedButton.icon(
            onPressed: _addSongs,
            style: compactButtonStyle,
            icon: const Icon(Icons.add_rounded, size: 20),
            label: const FittedBox(
              fit: BoxFit.scaleDown,
              child: Text('添加歌曲', maxLines: 1),
            ),
          ),
        ),
        const SizedBox(width: 4),
        SizedBox(
          width: 48,
          height: 48,
          child: _buildSortButton(state, songs),
        ),
        if (songs.isNotEmpty)
          SizedBox(
            width: 48,
            height: 48,
            child: IconButton.filledTonal(
              onPressed: _enterSelectMode,
              icon: const Icon(Icons.checklist_rounded),
              tooltip: '多选歌曲',
            ),
          ),
      ],
    );
  }

  Widget _buildPrimaryActions'''

          updated, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected one workspace-header match, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY
          dart format lib/features/playlist/presentation/playlist_detail_page.dart
          git diff --check
      - name: Commit layout fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/features/playlist/presentation/playlist_detail_page.dart
          git commit -m 'fix(mobile): keep playlist actions on one row'
          git push origin HEAD:mobile-experience-completion

name: Apply mobile metric row

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'ui-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply source change
        run: python scripts/apply_metric_row.py

      - name: Format and validate
        run: |
          dart format lib/features/home/presentation/home_page.dart
          flutter pub get
          flutter analyze
          git diff --check

      - name: Commit source change
        run: |
          if git diff --quiet; then
            echo "No source change needed"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib/features/home/presentation/home_page.dart
          git commit -m "fix(home): keep dashboard metrics on one mobile row"
          git push origin HEAD:ui-redesign

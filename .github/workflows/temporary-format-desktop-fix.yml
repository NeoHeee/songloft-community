name: Temporary format desktop fix

on:
  push:
    branches:
      - fix/desktop-page-width-alignment

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-page-width-alignment
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/home/presentation/home_page.dart \
            lib/features/library/presentation/widgets/song_filter_bar.dart \
            lib/features/settings/presentation/widgets/settings_master_detail.dart
      - name: Remove temporary workflow and commit formatting
        run: |
          git rm .github/workflows/temporary-format-desktop-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/features/home/presentation/home_page.dart \
            lib/features/library/presentation/widgets/song_filter_bar.dart \
            lib/features/settings/presentation/widgets/settings_master_detail.dart
          git commit -m "style: format with Flutter 3.41.5"
          git push origin HEAD:fix/desktop-page-width-alignment

name: Apply Playlist Lint Fix

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/apply-playlist-lint-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - name: Add mounted guards
        shell: python
        run: |
          from pathlib import Path

          target = Path('lib/features/playlist/presentation/playlist_detail_page.dart')
          text = target.read_text(encoding='utf-8')
          old = ".resetFilter();\n      ResponsiveSnackBar.showSuccess"
          new = ".resetFilter();\n      if (!mounted) return;\n      ResponsiveSnackBar.showSuccess"
          updated = text.replace(old, new)
          if updated == text:
              raise SystemExit('Expected resetFilter/snackbar pattern was not found')
          if updated.count('if (!mounted) return;') < text.count('if (!mounted) return;') + 2:
              raise SystemExit('Expected two mounted guards were not inserted')
          target.write_text(updated, encoding='utf-8')

          Path('.github/workflows/apply-playlist-lint-fix.yml').unlink()

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/playlist/presentation/playlist_detail_page.dart .github/workflows/apply-playlist-lint-fix.yml
          git commit -m "fix(ui): guard context after async sorting"
          git push origin ui-redesign

name: Diagnose Library Tests

on:
  push:
    branches:
      - mobile-experience-completion
    paths:
      - '.github/workflows/library-test-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run library tests with expanded output
        shell: bash
        run: |
          set +e
          flutter test test/features/library -r expanded > /tmp/library-test.log 2>&1
          status=$?
          set -e
          echo "EXIT=$status" >> /tmp/library-test.log
          cat /tmp/library-test.log
      - name: Persist temporary diagnostic log
        if: always()
        shell: bash
        run: |
          mkdir -p diagnostics
          cp /tmp/library-test.log diagnostics/library-test.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/library-test.log
          git commit -m 'chore: capture library test diagnostic' || exit 0
          git push origin HEAD:mobile-experience-completion

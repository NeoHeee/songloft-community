name: Diagnose Library Tests

on:
  push:
    branches:
      - mobile-experience-completion
    paths:
      - '.github/workflows/library-test-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run library tests with expanded output
        shell: bash
        run: |
          set +e
          flutter test test/features/library -r expanded > /tmp/library-test.log 2>&1
          status=$?
          set -e
          echo "EXIT=$status" >> /tmp/library-test.log
          cat /tmp/library-test.log
      - name: Upload library test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: library-test-diagnostic
          path: /tmp/library-test.log
          retention-days: 2
          if-no-files-found: error

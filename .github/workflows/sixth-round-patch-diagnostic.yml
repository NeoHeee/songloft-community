name: Sixth Round Patch Diagnostic

on:
  pull_request:
    branches:
      - mobile-fifth-round
    paths:
      - '.github/workflows/sixth-round-patch-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Generate and format sixth-round sources
        run: |
          python .github/scripts/sixth_round_patch.py
          dart format \
            lib/core/theme/accessibility.dart \
            lib/core/theme/app_theme.dart \
            lib/main.dart \
            lib/features/player/presentation/widgets/mini_player.dart \
            lib/features/player/presentation/widgets/mobile_player.dart \
            lib/features/player/presentation/widgets/mobile_player_gesture_host.dart \
            lib/features/player/presentation/widgets/vinyl_ring.dart \
            test/core/theme/app_theme_accessibility_test.dart
      - name: Stage export tree
        shell: bash
        run: |
          mkdir -p /tmp/sixth-round-sources
          for file in \
            lib/core/theme/accessibility.dart \
            lib/core/theme/app_theme.dart \
            lib/main.dart \
            lib/features/player/presentation/widgets/mini_player.dart \
            lib/features/player/presentation/widgets/mobile_player.dart \
            lib/features/player/presentation/widgets/mobile_player_gesture_host.dart \
            lib/features/player/presentation/widgets/vinyl_ring.dart \
            test/core/theme/app_theme_accessibility_test.dart \
            .github/workflows/ui-redesign-check.yml; do
            cp --parents "$file" /tmp/sixth-round-sources
          done
      - uses: actions/upload-artifact@v4
        with:
          name: sixth-round-formatted-sources
          path: /tmp/sixth-round-sources
          if-no-files-found: error
          retention-days: 3

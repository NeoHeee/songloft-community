name: Apply TV round one

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'tv-first-round'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout TV branch
        uses: actions/checkout@v4
        with:
          ref: tv-first-round
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply TV round-one patch
        run: python tool/apply_tv_round1.py

      - name: Replace TV banner with Android XML drawable
        run: |
          rm -f android/app/src/main/res/drawable-nodpi/tv_banner.png
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/tv_banner.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape android:shape="rectangle">
                      <gradient
                          android:angle="0"
                          android:startColor="#24164F"
                          android:centerColor="#49308D"
                          android:endColor="#176D8A" />
                      <corners android:radius="12dp" />
                  </shape>
              </item>
              <item
                  android:left="112dp"
                  android:top="42dp"
                  android:right="112dp"
                  android:bottom="42dp">
                  <shape android:shape="rectangle">
                      <solid android:color="#F4F0FF" />
                      <corners android:radius="18dp" />
                  </shape>
              </item>
              <item android:gravity="center">
                  <bitmap
                      android:src="@mipmap/ic_launcher"
                      android:gravity="center"
                      android:filter="true" />
              </item>
          </layer-list>
          EOF

      - name: Format changed Dart files
        run: |
          dart format \
            lib/config/app_config.dart \
            lib/core/theme/responsive.dart \
            lib/shared/widgets/tv_focusable.dart \
            lib/features/library/presentation/widgets/song_list_tile.dart \
            lib/features/playlist/presentation/widgets/playlist_card.dart \
            lib/features/playlist/presentation/widgets/playlist_list_item.dart \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/playlist_detail_page.dart \
            lib/shared/layouts/adaptive_scaffold.dart \
            lib/shared/layouts/shell_layout.dart

      - name: Analyze
        run: flutter analyze

      - name: Commit applied TV changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/config/app_config.dart \
            lib/core/theme/responsive.dart \
            lib/shared/widgets/tv_focusable.dart \
            lib/features/library/presentation/widgets/song_list_tile.dart \
            lib/features/playlist/presentation/widgets/playlist_card.dart \
            lib/features/playlist/presentation/widgets/playlist_list_item.dart \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/playlist_detail_page.dart \
            lib/shared/layouts/adaptive_scaffold.dart \
            lib/shared/layouts/shell_layout.dart \
            android/app/src/main/AndroidManifest.xml
          git add -A android/app/src/main/res
          if git diff --cached --quiet; then
            echo "No TV changes to commit"
          else
            git commit -m "feat(tv): complete first-round TV usability improvements"
            git push origin HEAD:tv-first-round
          fi

      - name: Build Android release APKs
        id: android_build
        shell: bash
        run: |
          set +e
          flutter build apk --release --split-per-abi > tv-build.log 2>&1
          status=$?
          cat tv-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-round1-build-log
          path: tv-build.log
          retention-days: 7

      - name: Upload APKs
        if: steps.android_build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-round1-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30

      - name: Fail when Android build failed
        if: steps.android_build.outputs.status != '0'
        run: exit 1

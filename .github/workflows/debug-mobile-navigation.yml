name: Debug Mobile Navigation Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/core/navigation/**'
      - '.github/workflows/debug-mobile-navigation.yml'

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Capture navigation test output
        shell: bash
        run: |
          set +e
          flutter test test/core/navigation --reporter expanded > mobile-navigation-test.log 2>&1
          status=$?
          echo "$status" > mobile-navigation-test.status
          cat mobile-navigation-test.log
          exit 0
      - name: Upload navigation test output
        uses: actions/upload-artifact@v4
        with:
          name: mobile-navigation-test-log
          path: |
            mobile-navigation-test.log
            mobile-navigation-test.status
          if-no-files-found: error
          retention-days: 1

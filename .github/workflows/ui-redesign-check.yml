name: UI Redesign Check

on:
  push:
    branches:
      - main
      - ui-redesign
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/theme_catalog/**'
      - 'web/**'
      - 'android/**'
      - 'windows/**'
      - 'examples/themes/**'
      - 'docs/theme-packs.md'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  pull_request:
    branches:
      - main
      - mobile-third-round
      - mobile-fourth-round
      - mobile-fifth-round
      - mobile-sixth-round
      - mobile-seventh-round
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/theme_catalog/**'
      - 'web/**'
      - 'android/**'
      - 'windows/**'
      - 'examples/themes/**'
      - 'docs/theme-packs.md'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ui-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-playlist-action-layout:
    name: Apply playlist action row fix
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'mobile-experience-completion'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Keep all four playlist actions on one row
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/features/playlist/presentation/playlist_detail_page.dart')
          source = path.read_text(encoding='utf-8')
          if '_buildCompactPlaylistActions(' in source:
              print('Compact action row is already present.')
              raise SystemExit(0)

          pattern = re.compile(
              r"  Widget _buildWorkspaceHeader\([\s\S]*?\n  Widget _buildPrimaryActions",
          )
          replacement = r'''  Widget _buildWorkspaceHeader(
    BuildContext context,
    Playlist playlist,
    AsyncValue<PaginatedSongsState> songsAsync, {
    required bool showPrimaryActions,
  }) {
    final theme = Theme.of(context);
    final colorScheme = theme.colorScheme;
    final state = songsAsync.value;
    final songs = state?.items ?? [];

    return Padding(
      padding: const EdgeInsets.fromLTRB(14, 14, 14, 4),
      child: Container(
        padding: const EdgeInsets.all(12),
        decoration: BoxDecoration(
          color: colorScheme.surfaceContainerLow,
          borderRadius: BorderRadius.circular(20),
          border: Border.all(
            color: colorScheme.outlineVariant.withValues(alpha: 0.22),
          ),
        ),
        child: LayoutBuilder(
          builder: (context, constraints) {
            final compact = constraints.maxWidth < 700;
            final showActions = !_isSortMode && !_isSelectMode;
            final actions = Wrap(
              spacing: 8,
              runSpacing: 8,
              crossAxisAlignment: WrapCrossAlignment.center,
              children: [
                if (showPrimaryActions && showActions) ...[
                  FilledButton.icon(
                    onPressed: songs.isEmpty
                        ? null
                        : () => _playAll(playlist, songs),
                    icon: const Icon(Icons.play_arrow_rounded),
                    label: const Text('播放全部'),
                  ),
                  OutlinedButton.icon(
                    onPressed: _addSongs,
                    icon: const Icon(Icons.add_rounded),
                    label: const Text('添加歌曲'),
                  ),
                ],
                if (showActions) _buildSortButton(state, songs),
                if (showActions && songs.isNotEmpty)
                  IconButton.filledTonal(
                    onPressed: _enterSelectMode,
                    icon: const Icon(Icons.checklist_rounded),
                    tooltip: '多选歌曲',
                  ),
              ],
            );

            final title = Column(
              crossAxisAlignment: CrossAxisAlignment.start,
              children: [
                Text(
                  _isSortMode
                      ? '调整歌曲顺序'
                      : _isSelectMode
                      ? '已选择 ${_selectedSongIds.length} 首'
                      : '歌曲列表',
                  style: theme.textTheme.titleMedium?.copyWith(
                    fontWeight: FontWeight.w800,
                  ),
                ),
                const SizedBox(height: 2),
                Text(
                  state == null
                      ? '正在读取歌单内容'
                      : state.keyword.isEmpty
                      ? '共 ${state.total} 首，可搜索、排序或批量管理'
                      : '搜索“${state.keyword}”，找到 ${state.total} 首',
                  maxLines: 1,
                  overflow: TextOverflow.ellipsis,
                  style: theme.textTheme.bodySmall?.copyWith(
                    color: colorScheme.onSurfaceVariant,
                  ),
                ),
              ],
            );

            if (compact) {
              return Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  title,
                  if (showActions) ...[
                    const SizedBox(height: 10),
                    if (showPrimaryActions)
                      _buildCompactPlaylistActions(playlist, state, songs)
                    else if (actions.children.isNotEmpty)
                      actions,
                  ],
                ],
              );
            }

            return Row(
              children: [
                Expanded(child: title),
                actions,
              ],
            );
          },
        ),
      ),
    );
  }

  Widget _buildCompactPlaylistActions(
    Playlist playlist,
    PaginatedSongsState? state,
    List<Song> songs,
  ) {
    final compactButtonStyle = ButtonStyle(
      minimumSize: const WidgetStatePropertyAll(Size(0, 48)),
      padding: const WidgetStatePropertyAll(
        EdgeInsets.symmetric(horizontal: 8),
      ),
      visualDensity: VisualDensity.compact,
    );

    return Row(
      children: [
        Expanded(
          child: FilledButton.icon(
            onPressed: songs.isEmpty ? null : () => _playAll(playlist, songs),
            style: compactButtonStyle,
            icon: const Icon(Icons.play_arrow_rounded, size: 20),
            label: const FittedBox(
              fit: BoxFit.scaleDown,
              child: Text('播放全部', maxLines: 1),
            ),
          ),
        ),
        const SizedBox(width: 6),
        Expanded(
          child: OutlinedButton.icon(
            onPressed: _addSongs,
            style: compactButtonStyle,
            icon: const Icon(Icons.add_rounded, size: 20),
            label: const FittedBox(
              fit: BoxFit.scaleDown,
              child: Text('添加歌曲', maxLines: 1),
            ),
          ),
        ),
        const SizedBox(width: 4),
        SizedBox(
          width: 48,
          height: 48,
          child: _buildSortButton(state, songs),
        ),
        if (songs.isNotEmpty)
          SizedBox(
            width: 48,
            height: 48,
            child: IconButton.filledTonal(
              onPressed: _enterSelectMode,
              icon: const Icon(Icons.checklist_rounded),
              tooltip: '多选歌曲',
            ),
          ),
      ],
    );
  }

  Widget _buildPrimaryActions'''

          updated, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected one workspace-header match, found {count}')
          path.write_text(updated, encoding='utf-8')
          PY
          dart format lib/features/playlist/presentation/playlist_detail_page.dart
          git diff --check
      - name: Commit layout fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No layout changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/features/playlist/presentation/playlist_detail_page.dart
          git commit -m 'fix(mobile): keep playlist actions on one row'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  analyze:
    name: Flutter analyze and focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Verify changed Dart formatting
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            head_sha="$(git rev-parse HEAD)"
          fi

          mapfile -t dart_files < <(
            git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )

          if [[ ${#dart_files[@]} -eq 0 ]]; then
            echo "No changed Dart files to format-check."
            exit 0
          fi

          printf 'Checking %s\n' "${dart_files[@]}"
          dart format --output=none --set-exit-if-changed "${dart_files[@]}"
      - name: Run theme system tests
        run: flutter test test/core/theme
      - name: Run network recovery tests
        run: flutter test test/core/network
      - name: Run mobile navigation tests
        run: flutter test test/core/navigation
      - name: Run cover cache utility tests
        run: flutter test test/core/utils/cover_cache_test.dart
      - name: Run cover image widget tests
        run: flutter test test/shared/widgets/cover_image_test.dart
      - name: Run library selection tests
        run: flutter test test/features/library
      - name: Run second-stage player tests
        run: flutter test test/features/player/presentation/widgets
      - name: Analyze
        run: flutter analyze

  build-web:
    name: Build Flutter Web
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release web app
        run: flutter build web --release --base-href /
      - name: Upload web preview
        uses: actions/upload-artifact@v4
        with:
          name: songloft-web-preview
          path: build/web
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android preview APKs
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[platform-build]')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
      - name: Upload Android clients
        uses: actions/upload-artifact@v4
        with:
          name: songloft-android-preview
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14
          if-no-files-found: error

  build-windows:
    name: Build complete Windows x64 bundle
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[platform-build]')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout redesigned player
        uses: actions/checkout@v4
      - name: Checkout Songloft backend
        uses: actions/checkout@v4
        with:
          repository: NeoHeee/songloft
          ref: main
          path: _server
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: _server/go.sum
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build bundled Go backend
        working-directory: _server
        shell: pwsh
        run: |
          $env:CGO_ENABLED = '0'
          $env:GOAMD64 = 'v1'
          go build -tags lite -o "$env:GITHUB_WORKSPACE\windows\runner\songloft-server.exe" .
      - name: Build Windows release
        run: >-
          flutter build windows --release
          --dart-define=HAS_BACKEND=true
      - name: Package portable client
        shell: pwsh
        run: Compress-Archive -Path 'build\windows\x64\runner\Release\*' -DestinationPath 'songloft-windows-x64.zip'
      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: songloft-windows-x64
          path: songloft-windows-x64.zip
          retention-days: 14
          if-no-files-found: error

# verifies theme packs, trusted catalog, sharing and formatted release sources
# second-stage release candidate validates player retry, drag selection, undo, skeletons and edge-to-edge integration

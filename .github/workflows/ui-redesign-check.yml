name: UI Redesign Check

on:
  push:
    branches:
      - ui-redesign
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  workflow_dispatch:

concurrency:
  group: ui-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib
      - name: Analyze
        run: flutter analyze

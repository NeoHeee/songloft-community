name: UI Redesign Check

on:
  push:
    branches:
      - ui-redesign
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  workflow_dispatch:

concurrency:
  group: ui-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Report formatting differences
        run: dart format --output=none lib
      - name: Analyze and capture report
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze 2>&1 | tee analyze.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload analyze report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-report
          path: analyze.log
          if-no-files-found: error
      - name: Fail when analyze reports issues
        if: steps.analyze.outputs.status != '0'
        run: exit 1

name: UI Redesign Check

on:
  push:
    branches:
      - main
      - ui-redesign
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/theme_catalog/**'
      - 'web/**'
      - 'android/**'
      - 'windows/**'
      - 'examples/themes/**'
      - 'docs/theme-packs.md'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  pull_request:
    branches:
      - main
      - mobile-third-round
      - mobile-fourth-round
      - mobile-fifth-round
      - mobile-sixth-round
      - mobile-seventh-round
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/theme_catalog/**'
      - 'web/**'
      - 'android/**'
      - 'windows/**'
      - 'examples/themes/**'
      - 'docs/theme-packs.md'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter analyze and focused tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Verify changed Dart formatting
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            head_sha="$(git rev-parse HEAD)"
          fi

          mapfile -t dart_files < <(
            git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )

          if [[ ${#dart_files[@]} -eq 0 ]]; then
            echo "No changed Dart files to format-check."
            exit 0
          fi

          printf 'Checking %s\n' "${dart_files[@]}"
          dart format "${dart_files[@]}"
          git diff --exit-code -- "${dart_files[@]}"
      - name: Run theme system tests
        run: flutter test test/core/theme
      - name: Run network recovery tests
        run: flutter test test/core/network
      - name: Run mobile navigation tests
        run: flutter test test/core/navigation
      - name: Run cover cache utility tests
        run: flutter test test/core/utils/cover_cache_test.dart
      - name: Run cover image widget tests
        run: flutter test test/shared/widgets/cover_image_test.dart
      - name: Run library selection tests
        run: flutter test test/features/library
      - name: Run second-stage player tests
        run: flutter test test/features/player/presentation/widgets
      - name: Analyze
        run: flutter analyze

  build-web:
    name: Build Flutter Web
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release web app
        run: flutter build web --release --base-href /
      - name: Package branded Web preview
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          tar -C build/web -czf "Songloft-Community-Web-preview-${VERSION}.tar.gz" .
      - name: Upload web preview
        uses: actions/upload-artifact@v4
        with:
          name: Songloft-Community-Web-preview
          path: Songloft-Community-Web-preview-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android preview APKs
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[platform-build]')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
      - name: Collect branded APKs
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          mkdir -p preview-output
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "preview-output/Songloft-Community-Android-arm64-v8a-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "preview-output/Songloft-Community-Android-armeabi-v7a-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "preview-output/Songloft-Community-Android-x86_64-${VERSION}.apk"
      - name: Upload Android clients
        uses: actions/upload-artifact@v4
        with:
          name: Songloft-Community-Android-preview
          path: preview-output/*.apk
          retention-days: 14
          if-no-files-found: error

  build-windows:
    name: Build complete Windows x64 bundle
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[platform-build]')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout redesigned player
        uses: actions/checkout@v4
      - name: Checkout Songloft backend
        uses: actions/checkout@v4
        with:
          repository: NeoHeee/songloft
          ref: main
          path: _server
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: _server/go.sum
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build bundled Go backend
        working-directory: _server
        shell: pwsh
        run: |
          $env:CGO_ENABLED = '0'
          $env:GOAMD64 = 'v1'
          go build -tags lite -o "$env:GITHUB_WORKSPACE\windows\runner\songloft-server.exe" .
      - name: Build Windows release
        run: >-
          flutter build windows --release
          --dart-define=HAS_BACKEND=true
      - name: Package branded portable client
        shell: pwsh
        run: |
          $versionLine = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line
          $version = (($versionLine -replace 'version:\s*', '') -split '\+')[0]
          $archive = "Songloft-Community-Windows-x64-$version.zip"
          Compress-Archive -Path 'build\windows\x64\runner\Release\*' -DestinationPath $archive
          "archive=$archive" >> $env:GITHUB_OUTPUT
        id: package
      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: Songloft-Community-Windows-x64-preview
          path: ${{ steps.package.outputs.archive }}
          retention-days: 14
          if-no-files-found: error

# verifies theme packs, trusted catalog, sharing and formatted release sources
# second-stage release candidate validates player retry, drag selection, undo, skeletons, system branding and edge-to-edge integration

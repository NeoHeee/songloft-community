name: Apply Songloft Community Branding

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ui-redesign-check.yml'
      - 'scripts/apply_community_branding.py'
      - 'scripts/generate_community_icons.py'

permissions:
  contents: write

concurrency:
  group: community-branding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-community-branding:
    if: github.head_ref == 'mobile-experience-completion'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Apply branding source changes
        run: python3 scripts/apply_community_branding.py
      - name: Generate icon assets
        run: |
          python3 -m pip install --disable-pip-version-check --quiet pillow
          python3 scripts/generate_community_icons.py
      - name: Regenerate platform launcher icons
        run: |
          flutter pub get
          dart run flutter_launcher_icons
      - name: Format branding sources
        run: |
          dart format \
            lib/config/app_brand.dart \
            lib/config/app_config.dart \
            lib/main.dart \
            lib/features/auth/presentation/login_page.dart \
            lib/features/home/presentation/home_page.dart \
            lib/features/settings/presentation/settings_page.dart
          git diff --check
      - name: Commit branding source and icon changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android assets ios lib linux macos pubspec.lock pubspec.yaml web windows
          git commit -m 'feat(brand): introduce Songloft Community identity'
          git push origin HEAD:mobile-experience-completion

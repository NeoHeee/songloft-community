name: UI Redesign Check

on:
  push:
    branches:
      - ui-redesign
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/theme_catalog/**'
      - 'web/**'
      - 'android/**'
      - 'windows/**'
      - 'examples/themes/**'
      - 'docs/theme-packs.md'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/theme_catalog/**'
      - 'web/**'
      - 'android/**'
      - 'windows/**'
      - 'examples/themes/**'
      - 'docs/theme-packs.md'
      - 'pubspec.yaml'
      - '.github/workflows/ui-redesign-check.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ui-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter analyze and theme system tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Apply mobile metric row
        shell: python
        run: |
          from pathlib import Path

          path = Path('lib/features/home/presentation/home_page.dart')
          text = path.read_text(encoding='utf-8')
          if "final compact = constraints.maxWidth < 600;" in text:
              print('Metric row already patched')
              raise SystemExit(0)

          old = '''                    Wrap(
                      spacing: 10,
                      runSpacing: 10,
                      children: [
                        _Metric(
                          icon: Icons.queue_music_rounded,
                          value: '$normalCount',
                          label: '歌单',
                        ),
                        _Metric(
                          icon: Icons.radio_rounded,
                          value: '$radioCount',
                          label: '电台',
                        ),
                        const _Metric(
                          icon: Icons.cloud_done_rounded,
                          value: '在线',
                          label: '音乐库',
                        ),
                      ],
                    ),
'''
          new = '''                    LayoutBuilder(
                      builder: (context, constraints) {
                        final compact = constraints.maxWidth < 600;
                        final metrics = <Widget>[
                          _Metric(
                            icon: Icons.queue_music_rounded,
                            value: '$normalCount',
                            label: '歌单',
                            compact: compact,
                          ),
                          _Metric(
                            icon: Icons.radio_rounded,
                            value: '$radioCount',
                            label: '电台',
                            compact: compact,
                          ),
                          _Metric(
                            icon: Icons.cloud_done_rounded,
                            value: '在线',
                            label: '音乐库',
                            compact: compact,
                          ),
                        ];

                        if (!compact) {
                          return Wrap(
                            spacing: 10,
                            runSpacing: 10,
                            children: metrics,
                          );
                        }

                        return Row(
                          children: [
                            for (var i = 0; i < metrics.length; i++) ...[
                              Expanded(child: metrics[i]),
                              if (i != metrics.length - 1)
                                const SizedBox(width: 8),
                            ],
                          ],
                        );
                      },
                    ),
'''
          if old not in text:
              raise RuntimeError('Metric wrap block not found')
          text = text.replace(old, new, 1)

          start = text.index('class _Metric extends StatelessWidget {')
          end = text.index('class _QuickActions extends StatelessWidget {', start)
          metric_class = '''class _Metric extends StatelessWidget {
            final IconData icon;
            final String value;
            final String label;
            final bool compact;

            const _Metric({
              required this.icon,
              required this.value,
              required this.label,
              this.compact = false,
            });

            @override
            Widget build(BuildContext context) {
              return Container(
                alignment: Alignment.center,
                padding: EdgeInsets.symmetric(
                  horizontal: compact ? 6 : 13,
                  vertical: 9,
                ),
                decoration: BoxDecoration(
                  color: Colors.black.withValues(alpha: 0.14),
                  borderRadius: BorderRadius.circular(14),
                ),
                child: FittedBox(
                  fit: BoxFit.scaleDown,
                  child: Row(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      Icon(icon, size: compact ? 16 : 17, color: Colors.white),
                      SizedBox(width: compact ? 5 : 8),
                      Text(
                        value,
                        maxLines: 1,
                        style: TextStyle(
                          color: Colors.white,
                          fontWeight: FontWeight.w800,
                          fontSize: compact ? 14 : null,
                        ),
                      ),
                      SizedBox(width: compact ? 3 : 5),
                      Text(
                        label,
                        maxLines: 1,
                        style: TextStyle(
                          color: Colors.white.withValues(alpha: 0.72),
                          fontWeight: FontWeight.w600,
                          fontSize: compact ? 14 : null,
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          '''
          text = text[:start] + metric_class + text[end:]
          path.write_text(text, encoding='utf-8')
      - name: Format changed source
        run: dart format lib/features/home/presentation/home_page.dart
      - name: Install dependencies
        run: flutter pub get
      - name: Check changed source formatting
        run: dart format -o none --set-exit-if-changed lib/features/home/presentation/home_page.dart
      - name: Run theme system tests
        run: flutter test test/core/theme
      - name: Analyze
        run: flutter analyze
      - name: Commit mobile metric row
        run: |
          if git diff --quiet; then
            echo "No source change needed"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib/features/home/presentation/home_page.dart
          git commit -m "fix(home): keep dashboard metrics on one mobile row"
          git push origin HEAD:ui-redesign

  build-web:
    name: Build Flutter Web
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release web app
        run: flutter build web --release --base-href /
      - name: Upload web preview
        uses: actions/upload-artifact@v4
        with:
          name: songloft-web-preview
          path: build/web
          if-no-files-found: error
          retention-days: 14

  build-android:
    name: Build Android preview APKs
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[platform-build]')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
      - name: Upload Android clients
        uses: actions/upload-artifact@v4
        with:
          name: songloft-android-preview
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14
          if-no-files-found: error

  build-windows:
    name: Build complete Windows x64 bundle
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[platform-build]')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout redesigned player
        uses: actions/checkout@v4
        with:
          ref: ui-redesign
      - name: Checkout Songloft backend
        uses: actions/checkout@v4
        with:
          repository: NeoHeee/songloft
          ref: main
          path: _server
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: _server/go.sum
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build bundled Go backend
        working-directory: _server
        shell: pwsh
        run: |
          $env:CGO_ENABLED = '0'
          $env:GOAMD64 = 'v1'
          go build -tags lite -o "$env:GITHUB_WORKSPACE\windows\runner\songloft-server.exe" .
      - name: Build Windows release
        run: >-
          flutter build windows --release
          --dart-define=HAS_BACKEND=true
      - name: Package portable client
        shell: pwsh
        run: Compress-Archive -Path 'build\windows\x64\runner\Release\*' -DestinationPath 'songloft-windows-x64.zip'
      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: songloft-windows-preview
          path: songloft-windows-x64.zip
          retention-days: 14
          if-no-files-found: error

# verifies theme packs, trusted catalog, sharing and formatted release sources

name: Eighth Round Source Snapshot

on:
  pull_request:
    branches:
      - mobile-seventh-round
    paths:
      - '.github/workflows/eighth-round-source-snapshot.yml'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: eighth-round-source-snapshot
          path: |
            lib
            test
            pubspec.yaml
          retention-days: 1
          if-no-files-found: error

name: Inspect PR formatting diff

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: read

jobs:
  inspect:
    if: github.event.pull_request.head.ref == 'mobile-polish-round-1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Capture formatter diff
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          mapfile -t dart_files < <(
            git diff --name-only --diff-filter=ACMRT "$base_sha"...HEAD -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )
          printf '%s\n' "${dart_files[@]}" > changed-dart-files.txt
          if [[ ${#dart_files[@]} -gt 0 ]]; then
            dart format "${dart_files[@]}"
            git diff --name-only -- "${dart_files[@]}" > formatter-changed-files.txt
            git diff -- "${dart_files[@]}" > formatter.patch
          else
            : > formatter-changed-files.txt
            : > formatter.patch
          fi
          cat changed-dart-files.txt
          cat formatter-changed-files.txt
      - name: Upload formatter report
        uses: actions/upload-artifact@v4
        with:
          name: mobile-polish-format-report
          path: |
            changed-dart-files.txt
            formatter-changed-files.txt
            formatter.patch
          retention-days: 2
          if-no-files-found: error

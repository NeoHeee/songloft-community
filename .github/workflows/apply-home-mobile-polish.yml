name: Apply home mobile polish

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/apply-home-mobile-polish.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply requested home changes
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one match, found {count}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          prefs = Path('lib/core/storage/app_preferences.dart')
          replace_once(
              prefs,
              "  static const _sourcePlaylistIdKey = 'player_source_playlist_id';\n",
              "  static const _sourcePlaylistIdKey = 'player_source_playlist_id';\n"
              "  static const _hiddenHomePluginEntriesKey =\n"
              "      'hidden_home_plugin_entries';\n",
          )
          replace_once(
              prefs,
              "  Future<void> clearPlaybackState() async {\n"
              "    await _prefs.remove(_currentIndexKey);\n"
              "    await _prefs.remove(_positionMsKey);\n"
              "    await _prefs.remove(_sourcePlaylistIdKey);\n"
              "  }\n\n"
              "  /// 清除所有偏好设置\n",
              "  Future<void> clearPlaybackState() async {\n"
              "    await _prefs.remove(_currentIndexKey);\n"
              "    await _prefs.remove(_positionMsKey);\n"
              "    await _prefs.remove(_sourcePlaylistIdKey);\n"
              "  }\n\n"
              "  /// 获取首页隐藏的插件入口。使用 entryPath 而不是数据库 ID，\n"
              "  /// 确保插件更新或重新安装后仍能保留用户选择。\n"
              "  Set<String> getHiddenHomePluginEntries() {\n"
              "    final entries =\n"
              "        _prefs.getStringList(_hiddenHomePluginEntriesKey) ??\n"
              "        const <String>[];\n"
              "    return entries\n"
              "        .map((entry) => entry.trim())\n"
              "        .where((entry) => entry.isNotEmpty)\n"
              "        .toSet();\n"
              "  }\n\n"
              "  /// 保存首页隐藏的插件入口。排序后写入，避免无意义的顺序变化。\n"
              "  Future<bool> setHiddenHomePluginEntries(Set<String> entryPaths) {\n"
              "    final entries =\n"
              "        entryPaths\n"
              "            .map((entry) => entry.trim())\n"
              "            .where((entry) => entry.isNotEmpty)\n"
              "            .toSet()\n"
              "            .toList()\n"
              "          ..sort();\n"
              "    return _prefs.setStringList(_hiddenHomePluginEntriesKey, entries);\n"
              "  }\n\n"
              "  /// 清除所有偏好设置\n",
          )

          home = Path('lib/features/home/presentation/home_page.dart')
          replace_once(
              home,
              "                    Text(\n"
              "                      _greeting(),\n"
              "                      style: theme.textTheme.displaySmall?.copyWith(\n"
              "                        color: Colors.white,\n"
              "                        fontWeight: FontWeight.w800,\n"
              "                        letterSpacing: -1.1,\n"
              "                        fontSize: isWide ? 42 : 31,\n"
              "                      ),\n"
              "                    ),\n",
              "                    SizedBox(\n"
              "                      width: double.infinity,\n"
              "                      child: FittedBox(\n"
              "                        fit: BoxFit.scaleDown,\n"
              "                        alignment: Alignment.centerLeft,\n"
              "                        child: Text(\n"
              "                          _greeting(),\n"
              "                          maxLines: 1,\n"
              "                          softWrap: false,\n"
              "                          style: theme.textTheme.displaySmall?.copyWith(\n"
              "                            color: Colors.white,\n"
              "                            fontWeight: FontWeight.w800,\n"
              "                            letterSpacing: -1.1,\n"
              "                            fontSize: isWide ? 42 : 31,\n"
              "                          ),\n"
              "                        ),\n"
              "                      ),\n"
              "                    ),\n",
          )

          grid = Path('lib/features/jsplugin/presentation/widgets/jsplugin_grid.dart')
          replace_once(
              grid,
              "import '../../../../core/router/app_router.dart';\n",
              "import '../../../../core/router/app_router.dart';\n"
              "import '../../../../core/storage/app_preferences.dart';\n",
          )
          replace_once(
              grid,
              "/// JS 插件快捷入口网格\n",
              "/// 首页插件入口隐藏状态。仅控制首页展示，不改变插件启用状态。\n"
              "final homePluginHiddenEntriesProvider =\n"
              "    AsyncNotifierProvider<HomePluginHiddenEntriesNotifier, Set<String>>(\n"
              "      HomePluginHiddenEntriesNotifier.new,\n"
              "    );\n\n"
              "class HomePluginHiddenEntriesNotifier extends AsyncNotifier<Set<String>> {\n"
              "  @override\n"
              "  Future<Set<String>> build() async {\n"
              "    final prefs = await AppPreferences.create();\n"
              "    return prefs.getHiddenHomePluginEntries();\n"
              "  }\n\n"
              "  Future<void> setVisible(\n"
              "    String entryPath, {\n"
              "    required bool visible,\n"
              "  }) async {\n"
              "    final current = state.value ?? const <String>{};\n"
              "    final next = <String>{...current};\n"
              "    if (visible) {\n"
              "      next.remove(entryPath);\n"
              "    } else {\n"
              "      next.add(entryPath);\n"
              "    }\n"
              "    state = AsyncData(next);\n"
              "    final prefs = await AppPreferences.create();\n"
              "    await prefs.setHiddenHomePluginEntries(next);\n"
              "  }\n\n"
              "  Future<void> showAll() async {\n"
              "    state = const AsyncData(<String>{});\n"
              "    final prefs = await AppPreferences.create();\n"
              "    await prefs.setHiddenHomePluginEntries(const <String>{});\n"
              "  }\n"
              "}\n\n"
              "/// JS 插件快捷入口网格\n",
          )
          replace_once(
              grid,
              "    final pluginsAsync = ref.watch(jsPluginsProvider);\n\n"
              "    return pluginsAsync.when(\n",
              "    final pluginsAsync = ref.watch(jsPluginsProvider);\n"
              "    final hiddenEntriesAsync = ref.watch(\n"
              "      homePluginHiddenEntriesProvider,\n"
              "    );\n\n"
              "    return pluginsAsync.when(\n",
          )
          replace_once(
              grid,
              "                .toList();\n\n"
              "        if (activePlugins.isEmpty) {\n",
              "                .toList();\n"
              "        final hiddenEntries =\n"
              "            hiddenEntriesAsync.value ?? const <String>{};\n"
              "        final visiblePlugins =\n"
              "            activePlugins\n"
              "                .where(\n"
              "                  (plugin) =>\n"
              "                      !hiddenEntries.contains(plugin.entryPath),\n"
              "                )\n"
              "                .toList();\n\n"
              "        if (activePlugins.isEmpty) {\n",
          )
          replace_once(
              grid,
              "                        Text(\n"
              "                          '${activePlugins.length} 个扩展已启用',\n"
              "                          style: theme.textTheme.bodySmall?.copyWith(\n"
              "                            color: colorScheme.onSurfaceVariant,\n"
              "                          ),\n"
              "                        ),\n"
              "                      ],\n"
              "                    ),\n"
              "                  ),\n"
              "                ],\n",
              "                        Text(\n"
              "                          '${visiblePlugins.length} 个显示 · '${activePlugins.length} 个已启用',\n"
              "                          style: theme.textTheme.bodySmall?.copyWith(\n"
              "                            color: colorScheme.onSurfaceVariant,\n"
              "                          ),\n"
              "                        ),\n"
              "                      ],\n"
              "                    ),\n"
              "                  ),\n"
              "                  IconButton.filledTonal(\n"
              "                    tooltip: '选择快捷入口',\n"
              "                    onPressed:\n"
              "                        () => _showVisibilitySheet(\n"
              "                          context,\n"
              "                          activePlugins,\n"
              "                        ),\n"
              "                    icon: const Icon(Icons.tune_rounded),\n"
              "                  ),\n"
              "                ],\n",
          )

          # Fix the interpolated subtitle as a separate exact replacement to keep
          # Python quoting readable.
          text = grid.read_text(encoding='utf-8')
          bad = "'${visiblePlugins.length} 个显示 · '${activePlugins.length} 个已启用'"
          good = "'${visiblePlugins.length} 个显示 · ${activePlugins.length} 个已启用'"
          if bad not in text:
              raise RuntimeError('subtitle interpolation placeholder was not created')
          grid.write_text(text.replace(bad, good, 1), encoding='utf-8')

          replace_once(
              grid,
              "              const SizedBox(height: 16),\n"
              "              LayoutBuilder(\n"
              "                builder: (context, constraints) {\n"
              "                  final width = constraints.maxWidth;\n"
              "                  final int crossAxisCount;\n"
              "                  if (context.isMobile ||\n"
              "                      width < ResponsiveBreakpoints.tablet) {\n"
              "                    crossAxisCount = (width / 104).floor().clamp(2, 4);\n"
              "                  } else if (width < ResponsiveBreakpoints.desktop) {\n"
              "                    crossAxisCount = (width / 128).floor().clamp(4, 5);\n"
              "                  } else {\n"
              "                    crossAxisCount = (width / 150).floor().clamp(4, 7);\n"
              "                  }\n\n"
              "                  return GridView.builder(\n"
              "                    shrinkWrap: true,\n"
              "                    physics: const NeverScrollableScrollPhysics(),\n"
              "                    gridDelegate: SliverGridDelegateWithFixedCrossAxisCount(\n"
              "                      crossAxisCount: crossAxisCount,\n"
              "                      mainAxisSpacing: 10,\n"
              "                      crossAxisSpacing: 10,\n"
              "                      childAspectRatio: 0.95,\n"
              "                    ),\n"
              "                    itemCount: activePlugins.length,\n"
              "                    itemBuilder: (context, index) {\n"
              "                      return _JSPluginCard(plugin: activePlugins[index]);\n"
              "                    },\n"
              "                  );\n"
              "                },\n"
              "              ),\n",
              "              const SizedBox(height: 16),\n"
              "              if (visiblePlugins.isEmpty)\n"
              "                Container(\n"
              "                  width: double.infinity,\n"
              "                  padding: const EdgeInsets.symmetric(\n"
              "                    horizontal: 16,\n"
              "                    vertical: 22,\n"
              "                  ),\n"
              "                  decoration: BoxDecoration(\n"
              "                    color: colorScheme.surfaceContainerHighest.withValues(\n"
              "                      alpha: 0.42,\n"
              "                    ),\n"
              "                    borderRadius: BorderRadius.circular(18),\n"
              "                  ),\n"
              "                  child: Column(\n"
              "                    children: [\n"
              "                      Icon(\n"
              "                        Icons.visibility_off_rounded,\n"
              "                        color: colorScheme.onSurfaceVariant,\n"
              "                      ),\n"
              "                      const SizedBox(height: 8),\n"
              "                      Text(\n"
              "                        '已隐藏全部快捷入口',\n"
              "                        style: theme.textTheme.bodyMedium?.copyWith(\n"
              "                          fontWeight: FontWeight.w700,\n"
              "                        ),\n"
              "                      ),\n"
              "                      const SizedBox(height: 3),\n"
              "                      Text(\n"
              "                        '点击右上角调节按钮可重新显示',\n"
              "                        style: theme.textTheme.bodySmall?.copyWith(\n"
              "                          color: colorScheme.onSurfaceVariant,\n"
              "                        ),\n"
              "                      ),\n"
              "                    ],\n"
              "                  ),\n"
              "                )\n"
              "              else\n"
              "                LayoutBuilder(\n"
              "                  builder: (context, constraints) {\n"
              "                    final width = constraints.maxWidth;\n"
              "                    final int crossAxisCount;\n"
              "                    if (context.isMobile ||\n"
              "                        width < ResponsiveBreakpoints.tablet) {\n"
              "                      crossAxisCount = (width / 104).floor().clamp(2, 4);\n"
              "                    } else if (width < ResponsiveBreakpoints.desktop) {\n"
              "                      crossAxisCount = (width / 128).floor().clamp(4, 5);\n"
              "                    } else {\n"
              "                      crossAxisCount = (width / 150).floor().clamp(4, 7);\n"
              "                    }\n\n"
              "                    return GridView.builder(\n"
              "                      shrinkWrap: true,\n"
              "                      physics: const NeverScrollableScrollPhysics(),\n"
              "                      gridDelegate:\n"
              "                          SliverGridDelegateWithFixedCrossAxisCount(\n"
              "                            crossAxisCount: crossAxisCount,\n"
              "                            mainAxisSpacing: 10,\n"
              "                            crossAxisSpacing: 10,\n"
              "                            childAspectRatio: 0.95,\n"
              "                          ),\n"
              "                      itemCount: visiblePlugins.length,\n"
              "                      itemBuilder: (context, index) {\n"
              "                        return _JSPluginCard(\n"
              "                          plugin: visiblePlugins[index],\n"
              "                        );\n"
              "                      },\n"
              "                    );\n"
              "                  },\n"
              "                ),\n",
          )
          replace_once(
              grid,
              "      error: (_, _) => const SizedBox.shrink(),\n"
              "    );\n"
              "  }\n"
              "}\n\n"
              "class _JSPluginCard extends StatelessWidget {\n",
              "      error: (_, _) => const SizedBox.shrink(),\n"
              "    );\n"
              "  }\n\n"
              "  void _showVisibilitySheet(\n"
              "    BuildContext context,\n"
              "    List<JSPlugin> plugins,\n"
              "  ) {\n"
              "    showModalBottomSheet<void>(\n"
              "      context: context,\n"
              "      isScrollControlled: true,\n"
              "      showDragHandle: true,\n"
              "      builder: (_) => _PluginVisibilitySheet(plugins: plugins),\n"
              "    );\n"
              "  }\n"
              "}\n\n"
              "class _PluginVisibilitySheet extends ConsumerWidget {\n"
              "  final List<JSPlugin> plugins;\n\n"
              "  const _PluginVisibilitySheet({required this.plugins});\n\n"
              "  @override\n"
              "  Widget build(BuildContext context, WidgetRef ref) {\n"
              "    final theme = Theme.of(context);\n"
              "    final colorScheme = theme.colorScheme;\n"
              "    final hiddenEntriesAsync = ref.watch(\n"
              "      homePluginHiddenEntriesProvider,\n"
              "    );\n"
              "    final hiddenEntries =\n"
              "        hiddenEntriesAsync.value ?? const <String>{};\n\n"
              "    return SafeArea(\n"
              "      child: ConstrainedBox(\n"
              "        constraints: const BoxConstraints(maxHeight: 620),\n"
              "        child: Column(\n"
              "          mainAxisSize: MainAxisSize.min,\n"
              "          children: [\n"
              "            Padding(\n"
              "              padding: const EdgeInsets.fromLTRB(20, 4, 12, 12),\n"
              "              child: Row(\n"
              "                children: [\n"
              "                  Expanded(\n"
              "                    child: Column(\n"
              "                      crossAxisAlignment: CrossAxisAlignment.start,\n"
              "                      children: [\n"
              "                        Text(\n"
              "                          '选择首页快捷入口',\n"
              "                          style: theme.textTheme.titleLarge?.copyWith(\n"
              "                            fontWeight: FontWeight.w800,\n"
              "                          ),\n"
              "                        ),\n"
              "                        const SizedBox(height: 4),\n"
              "                        Text(\n"
              "                          '隐藏后插件仍保持启用，可随时重新显示',\n"
              "                          style: theme.textTheme.bodySmall?.copyWith(\n"
              "                            color: colorScheme.onSurfaceVariant,\n"
              "                          ),\n"
              "                        ),\n"
              "                      ],\n"
              "                    ),\n"
              "                  ),\n"
              "                  TextButton(\n"
              "                    onPressed:\n"
              "                        hiddenEntries.isEmpty\n"
              "                            ? null\n"
              "                            : () =>\n"
              "                                ref\n"
              "                                    .read(\n"
              "                                      homePluginHiddenEntriesProvider\n"
              "                                          .notifier,\n"
              "                                    )\n"
              "                                    .showAll(),\n"
              "                    child: const Text('全部显示'),\n"
              "                  ),\n"
              "                ],\n"
              "              ),\n"
              "            ),\n"
              "            const Divider(height: 1),\n"
              "            Flexible(\n"
              "              child: ListView.separated(\n"
              "                padding: const EdgeInsets.symmetric(vertical: 8),\n"
              "                itemCount: plugins.length,\n"
              "                separatorBuilder:\n"
              "                    (_, _) => const Divider(\n"
              "                      height: 1,\n"
              "                      indent: 76,\n"
              "                    ),\n"
              "                itemBuilder: (context, index) {\n"
              "                  final plugin = plugins[index];\n"
              "                  final entryPath = plugin.entryPath!;\n"
              "                  final visible = !hiddenEntries.contains(entryPath);\n"
              "                  return SwitchListTile(\n"
              "                    value: visible,\n"
              "                    onChanged:\n"
              "                        hiddenEntriesAsync.isLoading\n"
              "                            ? null\n"
              "                            : (value) =>\n"
              "                                ref\n"
              "                                    .read(\n"
              "                                      homePluginHiddenEntriesProvider\n"
              "                                          .notifier,\n"
              "                                    )\n"
              "                                    .setVisible(\n"
              "                                      entryPath,\n"
              "                                      visible: value,\n"
              "                                    ),\n"
              "                    secondary: Container(\n"
              "                      width: 44,\n"
              "                      height: 44,\n"
              "                      decoration: BoxDecoration(\n"
              "                        color: colorScheme.surfaceContainerHighest,\n"
              "                        borderRadius: BorderRadius.circular(14),\n"
              "                      ),\n"
              "                      alignment: Alignment.center,\n"
              "                      child: PluginIcon(\n"
              "                        iconUrl: plugin.iconUrl,\n"
              "                        displayName: plugin.displayName,\n"
              "                        size: 34,\n"
              "                      ),\n"
              "                    ),\n"
              "                    title: Text(\n"
              "                      plugin.displayName,\n"
              "                      maxLines: 1,\n"
              "                      overflow: TextOverflow.ellipsis,\n"
              "                    ),\n"
              "                    subtitle:\n"
              "                        plugin.version == null\n"
              "                            ? null\n"
              "                            : Text('v${plugin.version}'),\n"
              "                  );\n"
              "                },\n"
              "              ),\n"
              "            ),\n"
              "          ],\n"
              "        ),\n"
              "      ),\n"
              "    );\n"
              "  }\n"
              "}\n\n"
              "class _JSPluginCard extends StatelessWidget {\n",
          )

      - name: Format and validate
        run: |
          dart format \
            lib/core/storage/app_preferences.dart \
            lib/features/home/presentation/home_page.dart \
            lib/features/jsplugin/presentation/widgets/jsplugin_grid.dart
          flutter pub get
          flutter analyze
          git diff --check

      - name: Commit changes
        run: |
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            lib/core/storage/app_preferences.dart \
            lib/features/home/presentation/home_page.dart \
            lib/features/jsplugin/presentation/widgets/jsplugin_grid.dart
          git commit -m "feat(home): customize plugin shortcuts and keep greeting on one line"
          git push origin HEAD:ui-redesign

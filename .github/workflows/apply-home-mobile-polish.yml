name: Apply home mobile polish

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'ui-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply source changes
        run: python scripts/apply_home_mobile_polish.py

      - name: Format and validate
        run: |
          dart format lib test
          flutter pub get
          flutter test test/core/theme
          flutter analyze
          git diff --check

      - name: Commit changes
        run: |
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib test
          git commit -m "feat(home): customize plugin shortcuts and keep greeting on one line"
          git push origin HEAD:ui-redesign

name: Inspect release list

on:
  push:
    branches:
      - fix/desktop-page-width-alignment
    paths:
      - '.github/workflows/inspect-release-list.yml'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-page-width-alignment
      - name: Save release details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo '=== release list ==='
            gh release list --repo "$GITHUB_REPOSITORY" --limit 20
            echo
            echo '=== dev ==='
            gh release view dev --repo "$GITHUB_REPOSITORY" --json name,tagName,isPrerelease,targetCommitish,publishedAt,url,assets --jq '{name,tagName,isPrerelease,targetCommitish,publishedAt,url,assets:[.assets[]|{name,size}]}'
            echo
            echo '=== stable ==='
            gh release view v1.0.0-community.2 --repo "$GITHUB_REPOSITORY" --json name,tagName,isPrerelease,targetCommitish,publishedAt,url,assets --jq '{name,tagName,isPrerelease,targetCommitish,publishedAt,url,assets:[.assets[]|{name,size}]}'
          } > release-details.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-details.txt
          git commit -m "chore: refresh release details"
          git push origin HEAD:fix/desktop-page-width-alignment

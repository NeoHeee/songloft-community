name: Verify dev release

on:
  push:
    branches:
      - fix/desktop-page-width-alignment
    paths:
      - '.github/workflows/inspect-release-list.yml'

permissions:
  contents: write
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-page-width-alignment
      - name: Record dev release and recent runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo '=== dev release ==='
            gh release view dev --repo "$GITHUB_REPOSITORY" \
              --json name,tagName,isPrerelease,targetCommitish,publishedAt,url,assets \
              --jq '{name,tagName,isPrerelease,targetCommitish,publishedAt,url,assets:[.assets[]|{name,size}]}'
            echo
            echo '=== recent runs ==='
            gh run list --repo "$GITHUB_REPOSITORY" --limit 10
          } > release-verification.txt
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-verification.txt
          git commit -m "chore: verify refreshed dev release"
          git push origin HEAD:fix/desktop-page-width-alignment

name: Inspect release list

on:
  push:
    branches:
      - fix/desktop-page-width-alignment
    paths:
      - '.github/workflows/inspect-release-list.yml'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-page-width-alignment
      - name: Save release list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 20 > release-list.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-list.txt
          git commit -m "chore: record current release list"
          git push origin HEAD:fix/desktop-page-width-alignment

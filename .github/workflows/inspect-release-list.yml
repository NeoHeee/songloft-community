name: Inspect release workflow history

on:
  push:
    branches:
      - fix/desktop-page-width-alignment
    paths:
      - '.github/workflows/inspect-release-list.yml'

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-page-width-alignment
      - name: Collect workflow history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > workflow-history.txt
          echo '=== workflow files ===' >> workflow-history.txt
          find .github/workflows -maxdepth 1 -type f -print | sort >> workflow-history.txt
          echo '=== release-related lines ===' >> workflow-history.txt
          grep -RInE 'release|iOS-arm64-nosign|Web-embedded|Windows-x64-dev|AppImage|\.dmg|\.msix' .github/workflows >> workflow-history.txt || true
          echo '=== recent runs ===' >> workflow-history.txt
          gh run list --repo "$GITHUB_REPOSITORY" --limit 30 >> workflow-history.txt
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workflow-history.txt
          git commit -m "chore: record release workflow history"
          git push origin HEAD:fix/desktop-page-width-alignment

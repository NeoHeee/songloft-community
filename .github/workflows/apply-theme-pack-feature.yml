name: Apply theme pack feature

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/apply-theme-pack-feature.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-theme-pack-feature.yml'

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply integration patch
        run: python scripts/apply-theme-pack-feature.py

      - name: Format changed sources
        run: |
          dart format \
            lib/main.dart \
            lib/core/theme/app_theme.dart \
            lib/core/theme/theme_pack.dart \
            lib/core/theme/theme_pack_provider.dart \
            lib/core/theme/theme_tokens.dart \
            lib/features/settings/presentation/settings_page.dart \
            lib/features/settings/presentation/widgets/theme_pack_manager.dart \
            lib/shared/layouts/redesigned_desktop_shell.dart \
            lib/features/player/presentation/widgets/mini_player.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        shell: bash
        run: |
          set +e
          flutter analyze > theme-pack-analyze.log 2>&1
          status=$?
          cat theme-pack-analyze.log
          exit "$status"

      - name: Upload analyzer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-pack-analyzer-diagnostics
          path: theme-pack-analyze.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload integrated sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-pack-integrated-sources
          path: |
            lib/main.dart
            lib/core/theme/app_theme.dart
            lib/core/theme/theme_pack.dart
            lib/core/theme/theme_pack_provider.dart
            lib/core/theme/theme_tokens.dart
            lib/features/settings/presentation/settings_page.dart
            lib/features/settings/presentation/widgets/theme_pack_manager.dart
            lib/shared/layouts/redesigned_desktop_shell.dart
            lib/features/player/presentation/widgets/mini_player.dart
          if-no-files-found: error
          retention-days: 7

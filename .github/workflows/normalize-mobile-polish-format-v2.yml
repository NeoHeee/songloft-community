name: Normalize mobile formatting after pub get

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.ref == 'mobile-polish-round-1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-polish-round-1
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies first
        run: flutter pub get
      - name: Format changed Dart files with resolved language version
        shell: bash
        run: |
          git fetch origin main
          mapfile -t dart_files < <(
            git diff --name-only --diff-filter=ACMRT origin/main...HEAD -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )
          printf 'Formatting %s\n' "${dart_files[@]}"
          if [[ ${#dart_files[@]} -gt 0 ]]; then
            dart format "${dart_files[@]}"
          fi
      - name: Validate
        run: |
          flutter analyze
          flutter test test/core/theme
          flutter test test/features/player/domain/lyric_parser_test.dart
      - name: Commit normalized formatting
        shell: bash
        run: |
          if git diff --quiet -- lib test; then
            echo "Changed Dart files already normalized"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib test
          git commit -m "style: normalize Dart formatting after pub get"
          git push origin HEAD:mobile-polish-round-1

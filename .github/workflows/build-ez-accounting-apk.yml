name: Build EZ Accounting APK

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-ez-accounting-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore EZ记账 source
        shell: bash
        run: |
          mkdir -p tools/ez-accounting-android
          echo '' | base64 --decode | tar -xzf - -C tools/ez-accounting-android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: tools/ez-accounting-android
        run: gradle --no-daemon :app:assembleDebug

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp tools/ez-accounting-android/app/build/outputs/apk/debug/app-debug.apk 'dist/EZ记账-v1.0.0.apk'
          (cd tools && zip -qr '../dist/EZ记账-Android-source-v1.0.0.zip' ez-accounting-android)
          cd dist
          sha256sum 'EZ记账-v1.0.0.apk' > 'EZ记账-v1.0.0.apk.sha256'

      - name: Upload APK and source
        uses: actions/upload-artifact@v4
        with:
          name: EZ记账-Android-v1.0.0
          path: dist/*
          if-no-files-found: error
          retention-days: 14

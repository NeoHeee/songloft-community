name: Apply Android back navigation

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'ui-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply source changes
        run: |
          python scripts/apply_android_back_navigation.py
          python scripts/limit_android_back_to_mobile.py

      - name: Format and validate
        run: |
          dart format \
            lib/shared/layouts/shell_layout.dart \
            lib/features/settings/presentation/settings_page.dart
          flutter pub get
          flutter analyze
          git diff --check

      - name: Commit source changes
        run: |
          if git diff --quiet; then
            echo "No source change needed"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            lib/shared/layouts/shell_layout.dart \
            lib/features/settings/presentation/settings_page.dart
          git commit -m "fix(navigation): keep Android back handling mobile-only"
          git push origin HEAD:ui-redesign

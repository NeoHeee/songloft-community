name: Fix Flutter Reorder API

on:
  push:
    branches:
      - mobile-experience-completion
    paths:
      - '.github/workflows/fix-reorder-api.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Replace deprecated reorder callback parameter
        shell: bash
        run: |
          grep -RIl 'onReorderItem:' lib | xargs -r sed -i 's/onReorderItem:/onReorder:/g'
          dart format lib
      - name: Commit compatibility fix
        shell: bash
        run: |
          if git diff --quiet -- lib; then
            echo 'No reorder API changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib
          git commit -m 'fix: use Flutter 3.41 reorder callback API'
          git push origin HEAD:mobile-experience-completion

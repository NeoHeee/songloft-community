name: Format Second-Stage Dart Sources Once

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/mobile-experience-format-once.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Format all changed Dart sources
        shell: bash
        run: |
          git fetch origin main
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMRT origin/main...HEAD -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )
          printf 'Formatting %s\n' "${files[@]}"
          if (( ${#files[@]} > 0 )); then
            dart format "${files[@]}"
          fi
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'All changed Dart files were already formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test
          git commit -m 'style: format second-stage mobile sources'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: Apply TV icon polish

on:
  pull_request:
    branches: [tv-fifth-round-assist-input]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'tv-sixth-round-icon-polish'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout icon-polish branch
        uses: actions/checkout@v4
        with:
          ref: tv-sixth-round-icon-polish
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Correct icon-polish patch helper
        run: python tool/fix_tv_icon_polish_helper.py

      - name: Apply TV icon polish
        id: apply_patch
        shell: bash
        run: |
          set +e
          python tool/apply_tv_icon_polish.py > tv-icon-polish-patch.log 2>&1
          status=$?
          cat tv-icon-polish-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-icon-polish-patch-log
          path: tv-icon-polish-patch.log
          retention-days: 7

      - name: Stop when patch failed
        if: steps.apply_patch.outputs.status != '0'
        run: exit 1

      - name: Format changed files
        run: |
          dart format \
            lib/core/theme/tv_theme.dart \
            lib/core/theme/app_theme.dart \
            lib/shared/widgets/tv_focusable.dart \
            lib/shared/widgets/tv_icon_surface.dart \
            lib/features/home/presentation/tv_home_page.dart \
            lib/features/settings/presentation/widgets/settings_master_detail.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/features/jsplugin/presentation/widgets/plugin_registry.dart

      - name: Analyze
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze > tv-icon-polish-analyze.log 2>&1
          status=$?
          cat tv-icon-polish-analyze.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload analyze log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-icon-polish-analyze-log
          path: tv-icon-polish-analyze.log
          retention-days: 7

      - name: Stop when analyze failed
        if: steps.analyze.outputs.status != '0'
        run: exit 1

      - name: Commit TV icon changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/core/theme/tv_theme.dart \
            lib/core/theme/app_theme.dart \
            lib/shared/widgets/tv_focusable.dart \
            lib/shared/widgets/tv_icon_surface.dart \
            lib/features/home/presentation/tv_home_page.dart \
            lib/features/settings/presentation/widgets/settings_master_detail.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/features/jsplugin/presentation/widgets/plugin_registry.dart
          if git diff --cached --quiet; then
            echo "No TV icon changes to commit"
          else
            git commit -m "feat(tv): unify icon sizing and plugin artwork"
            git push origin HEAD:tv-sixth-round-icon-polish
          fi

      - name: Build Android release APKs
        id: android_build
        shell: bash
        run: |
          set +e
          flutter build apk --release --split-per-abi > tv-icon-polish-build.log 2>&1
          status=$?
          cat tv-icon-polish-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-icon-polish-build-log
          path: tv-icon-polish-build.log
          retention-days: 7

      - name: Upload APKs
        if: steps.android_build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-icon-polish-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30

      - name: Fail when Android build failed
        if: steps.android_build.outputs.status != '0'
        run: exit 1

name: LAN server discovery

on:
  push:
    branches:
      - mobile-lan-server-discovery
    paths:
      - 'scripts/apply_lan_server_discovery.py'
      - '.github/workflows/lan-server-discovery.yml'

permissions:
  contents: write

jobs:
  apply-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-lan-server-discovery
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply login page changes
        run: python scripts/apply_lan_server_discovery.py

      - name: Format changed source
        run: |
          dart format \
            lib/core/network/server_discovery.dart \
            lib/core/network/server_discovery_models.dart \
            lib/core/network/server_discovery_stub.dart \
            lib/core/network/server_discovery_io.dart \
            lib/features/auth/presentation/login_page.dart

      - name: Analyze
        run: flutter analyze

      - name: Run focused tests
        run: |
          flutter test test/core/theme
          flutter test test/features/player/domain/lyric_parser_test.dart

      - name: Build Android release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Web release
        run: flutter build web --release --base-href /

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: songloft-lan-discovery-android
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14
          if-no-files-found: error

      - name: Commit source changes
        run: |
          if git diff --quiet -- lib; then
            echo "No source changes to commit"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add lib/core/network lib/features/auth/presentation/login_page.dart
          git commit -m "feat(login): discover Songloft servers on the local network"
          git push origin HEAD:mobile-lan-server-discovery

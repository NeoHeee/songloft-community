name: Stateful shell smoke test

on:
  pull_request:
    branches:
      - main
    types:
      - edited

permissions:
  contents: write

jobs:
  smoke-test:
    if: github.event.pull_request.head.ref == 'mobile-stateful-shell'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-stateful-shell
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Normalize test formatting
        run: dart format test/core/router/stateful_shell_route_test.dart
      - name: Run real router structure test
        run: flutter test test/core/router/stateful_shell_route_test.dart
      - name: Analyze navigation sources
        run: flutter analyze lib/core/router/app_router.dart lib/shared/layouts/shell_layout.dart test/core/router/stateful_shell_route_test.dart
      - name: Commit normalized test formatting
        shell: bash
        run: |
          if git diff --quiet -- test/core/router/stateful_shell_route_test.dart; then
            echo "Router test already formatted"
            exit 0
          fi
          git config user.name "Songloft UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add test/core/router/stateful_shell_route_test.dart
          git commit -m "style(nav): normalize router structure test"
          git push origin HEAD:mobile-stateful-shell

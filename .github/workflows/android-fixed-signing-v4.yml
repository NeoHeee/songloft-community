name: Android Fixed Signing v4

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'lib/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'scripts/prepare-android-release-keystore.sh'
      - '.github/workflows/android-fixed-signing-v4.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: android-fixed-signing-v4-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.5'
  EXPECTED_CERT_SHA256: 'CA:A0:0F:91:D7:3B:12:AD:E2:5E:8A:43:20:18:1E:B5:20:A6:65:49:FD:08:9A:56:E4:69:4A:19:13:E9:68:F1'
  STATUS_PR_NUMBER: '24'

jobs:
  build:
    name: Build, upload and verify fixed-signed APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Record build start
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- android-signed-build-status -->';
            const issue_number = Number(process.env.STATUS_PR_NUMBER);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## 最近一次固定签名 Android 构建

            - 状态：⏳ 构建中
            - Commit：\`${context.sha}\`
            - Run ID：\`${context.runId}\`
            - 工作流：\`Android Fixed Signing v4\`
            - 运行详情：[打开 GitHub Actions](${runUrl})
            - Certificate SHA-256：\`${process.env.EXPECTED_CERT_SHA256}\`

            启动时间：${new Date().toISOString()}`.replace(/^            /gm, '');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
            }

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recover and validate fixed release keystore
        shell: bash
        env:
          RAW_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          RAW_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RAW_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RAW_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash scripts/prepare-android-release-keystore.sh

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi

      - name: Collect APKs and certificate report
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          mkdir -p signed-output
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "signed-output/Songloft-Community-Android-arm64-v8a-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "signed-output/Songloft-Community-Android-armeabi-v7a-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "signed-output/Songloft-Community-Android-x86_64-${VERSION}.apk"

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          apksigner=$(find "$sdk_root/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          test -n "$apksigner" || { echo '::error::apksigner not found'; exit 1; }

          expected=$(printf '%s' "$EXPECTED_CERT_SHA256" | tr -d ':' | tr '[:upper:]' '[:lower:]')
          verification='success'
          : > signed-output/SIGNING-CERTIFICATE.txt
          : > signed-output/SIGNING-RESULTS.txt

          for apk in signed-output/*.apk; do
            cert_output=$("$apksigner" verify --verbose --print-certs "$apk" 2>&1) || verification='mismatch'
            printf '== %s ==\n%s\n\n' "$(basename "$apk")" "$cert_output" >> signed-output/SIGNING-CERTIFICATE.txt
            actual=$(printf '%s\n' "$cert_output" \
              | grep -i 'certificate SHA-256 digest' \
              | head -n 1 \
              | sed -E 's/.*digest:[[:space:]]*//' \
              | tr -d ':[:space:]' \
              | tr '[:upper:]' '[:lower:]')
            printf '%s  %s\n' "${actual:-NOT_FOUND}" "$(basename "$apk")" >> signed-output/SIGNING-RESULTS.txt
            if [[ -z "$actual" || "$actual" != "$expected" ]]; then
              verification='mismatch'
            fi
          done

          sha256sum signed-output/*.apk > signed-output/SHA256SUMS.txt
          echo "verification=$verification" >> "$GITHUB_OUTPUT"

      - name: Upload fixed-signed Android APKs and reports
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: Songloft-Community-Android-fixed-signed
          path: signed-output/*
          retention-days: 30
          if-no-files-found: error

      - name: Enforce certificate match
        if: ${{ steps.collect.outputs.verification != 'success' }}
        shell: bash
        run: |
          echo '::error::APK certificate report did not match the expected fixed certificate. Artifact was uploaded for inspection.'
          cat signed-output/SIGNING-RESULTS.txt
          exit 1

      - name: Record signed build success
        if: ${{ steps.collect.outputs.verification == 'success' }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- android-signed-build-status -->';
            const issue_number = Number(process.env.STATUS_PR_NUMBER);
            const sums = fs.readFileSync('signed-output/SHA256SUMS.txt', 'utf8').trim()
              .split(/\r?\n/).filter(Boolean).map(line => {
                const parts = line.trim().split(/\s+/);
                const sha = parts.shift();
                const file = parts.join(' ').replace(/^signed-output\//, '');
                return `- \`${file}\`: \`${sha}\``;
              }).join('\n');
            const version = fs.readFileSync('pubspec.yaml', 'utf8').match(/^version:\s*([^\s+]+)/m)?.[1] ?? 'unknown';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## 最近一次固定签名 Android 构建

            - 状态：✅ 成功
            - Commit：\`${context.sha}\`
            - Run ID：\`${context.runId}\`
            - 工作流：\`Android Fixed Signing v4\`
            - 运行详情：[打开 GitHub Actions](${runUrl})
            - Artifact ID：\`${process.env.ARTIFACT_ID}\`
            - Artifact：[下载构建产物](${process.env.ARTIFACT_URL})
            - Artifact digest：\`${process.env.ARTIFACT_DIGEST}\`
            - Version：\`${version}\`
            - Certificate SHA-256：\`${process.env.EXPECTED_CERT_SHA256}\`

            ### APK SHA-256
            ${sums}

            更新时间：${new Date().toISOString()}`.replace(/^            /gm, '');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
            }

      - name: Record signed build failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- android-signed-build-status -->';
            const issue_number = Number(process.env.STATUS_PR_NUMBER);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactLine = process.env.ARTIFACT_ID
              ? `- Artifact ID：\`${process.env.ARTIFACT_ID}\`\n- Artifact：[下载诊断产物](${process.env.ARTIFACT_URL})`
              : '- Artifact：未生成';
            const body = `${marker}
            ## 最近一次固定签名 Android 构建

            - 状态：❌ 失败
            - Commit：\`${context.sha}\`
            - Run ID：\`${context.runId}\`
            - 工作流：\`Android Fixed Signing v4\`
            - 运行详情：[查看失败步骤和日志](${runUrl})
            ${artifactLine}
            - Certificate SHA-256：\`${process.env.EXPECTED_CERT_SHA256}\`

            更新时间：${new Date().toISOString()}`.replace(/^            /gm, '');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
            }

name: Format desktop home layout source

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/format-desktop-home-layout.yml'
      - 'lib/features/home/presentation/home_page.dart'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-home-hero-layout
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed Dart source
        run: dart format lib/features/home/presentation/home_page.dart

      - name: Commit formatter output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/features/home/presentation/home_page.dart
          if git diff --cached --quiet; then
            echo 'Source is already formatted'
            exit 0
          fi
          git commit -m 'style(home): apply Dart formatter'
          git push origin HEAD:fix/desktop-home-hero-layout

name: Fifth Round Format Diagnostic

on:
  pull_request:
    branches:
      - mobile-fourth-round
    paths:
      - 'lib/**'
      - 'test/**'
      - '.github/workflows/fifth-round-format-diagnostic.yml'

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Format changed Dart files
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          mapfile -t dart_files < <(
            git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" -- \
              | grep -E '^(lib|test)/.*\.dart$' \
              || true
          )
          mkdir -p /tmp/formatted-dart-sources
          if [[ ${#dart_files[@]} -gt 0 ]]; then
            dart format "${dart_files[@]}"
            for file in "${dart_files[@]}"; do
              cp --parents "$file" /tmp/formatted-dart-sources
            done
          fi
      - name: Upload formatted Dart sources
        uses: actions/upload-artifact@v4
        with:
          name: fifth-round-formatted-sources
          path: /tmp/formatted-dart-sources
          if-no-files-found: error
          retention-days: 3

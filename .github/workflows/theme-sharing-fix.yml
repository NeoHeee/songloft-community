name: Fix theme sharing

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/theme-sharing-fix.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/theme-sharing-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Apply sharing fix
        run: python scripts/fix-theme-sharing.py
      - name: Format sources
        run: dart format lib test
      - name: Install dependencies
        run: flutter pub get
      - name: Run theme tests
        run: flutter test test/core/theme/theme_pack_test.dart
      - name: Analyze
        shell: bash
        run: |
          set +e
          flutter analyze > theme-sharing-analyze.log 2>&1
          status=$?
          cat theme-sharing-analyze.log
          exit "$status"
      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-sharing-analyzer-log
          path: theme-sharing-analyze.log
          if-no-files-found: warn
          retention-days: 7
      - name: Commit fixed sources
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test docs/theme-packs.md
          if git diff --cached --quiet; then
            echo "No source changes"
            exit 0
          fi
          git commit -m "feat(theme): finish preview export and sharing workflow [platform-build]"
          git push origin ui-redesign

# analyzer-fix-rerun

name: Format Community Branch With Dependencies

on:
  push:
    branches:
      - mobile-experience-completion
    paths:
      - '.github/workflows/format-community-with-deps.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Resolve Flutter dependencies
        run: flutter pub get
      - name: Normalize Dart formatting
        run: dart format lib test
      - name: Commit dependency-aware formatting
        shell: bash
        run: |
          if git diff --quiet -- lib test; then
            echo 'No Dart formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test
          git commit -m 'style: normalize dependency-aware Dart formatting'
          git push origin HEAD:mobile-experience-completion

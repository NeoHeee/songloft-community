name: Apply playlist and mobile navigation follow-up

on:
  push:
    branches:
      - ui-redesign
    paths:
      - '.github/workflows/apply-playlist-mobile-nav-followup.yml'

permissions:
  contents: write

jobs:
  apply-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui-redesign
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Apply source updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          def regex_once(path: str, pattern: str, replacement: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Expected one regex match in {path}, got {count}: {pattern}')
              file.write_text(updated, encoding='utf-8')

          playlists = 'lib/features/playlist/presentation/playlists_page.dart'
          replace_once(
              playlists,
              "import 'dart:io' show File;",
              "import 'dart:async';\nimport 'dart:io' show File;",
          )
          replace_once(
              playlists,
              """  String? _selectedType;
          bool _isSelectionMode = false;
          final Set<int> _selectedPlaylistIds = {};

          /// 排序模式
          """,
              """  String? _selectedType;
          bool _isSelectionMode = false;
          final Set<int> _selectedPlaylistIds = {};
          final _searchController = TextEditingController();
          Timer? _searchDebounce;
          String _searchQuery = '';

          /// 排序模式
          """,
          )
          replace_once(
              playlists,
              """  @override
          void dispose() {
            _scrollController.removeListener(_onScroll);
            _scrollController.dispose();
            super.dispose();
          }
          """,
              """  @override
          void dispose() {
            _searchDebounce?.cancel();
            _searchController.dispose();
            _scrollController.removeListener(_onScroll);
            _scrollController.dispose();
            super.dispose();
          }
          """,
          )
          replace_once(
              playlists,
              """  void _toggleSelectMode() {
          """,
              """  void _onSearchChanged(String value) {
            _searchDebounce?.cancel();
            _searchDebounce = Timer(const Duration(milliseconds: 250), () async {
              final query = value.trim().toLowerCase();
              if (query.isNotEmpty) {
                try {
                  await ref.read(playlistListProvider(_selectedType).future);
                  await ref
                      .read(playlistListProvider(_selectedType).notifier)
                      .loadAll();
                } catch (_) {
                  // 搜索仍可基于已经加载的歌单执行。
                }
              }
              if (!mounted) return;
              setState(() => _searchQuery = query);
            });
          }

          void _clearSearch() {
            _searchDebounce?.cancel();
            _searchController.clear();
            setState(() => _searchQuery = '');
          }

          Future<void> _changeSelectedType(String? type) async {
            setState(() {
              _selectedType = type;
              _selectedPlaylistIds.clear();
            });
            if (_searchQuery.isEmpty) return;
            try {
              await ref.read(playlistListProvider(type).future);
              await ref.read(playlistListProvider(type).notifier).loadAll();
            } catch (_) {
              // 类型切换失败时由页面现有错误状态负责展示。
            }
          }

          List<Playlist> _filterPlaylists(List<Playlist> playlists) {
            if (_searchQuery.isEmpty) return playlists;
            return playlists.where((playlist) {
              final searchable = [
                playlist.name,
                playlist.description ?? '',
                playlist.type,
                playlist.labels.join(' '),
              ].join(' ').toLowerCase();
              return searchable.contains(_searchQuery);
            }).toList();
          }

          void _toggleSelectMode() {
          """,
          )
          replace_once(
              playlists,
              """                  slivers: [
                    // 类型筛选
          """,
              """                  slivers: [
                    SliverToBoxAdapter(child: _buildSearchBar()),

                    // 类型筛选
          """,
          )
          replace_once(
              playlists,
              """                          onSelectionChanged: (selected) {
                            setState(() {
                              _selectedType = selected.first;
                            });
                          },
          """,
              """                          onSelectionChanged: (selected) {
                            _changeSelectedType(selected.first);
                          },
          """,
          )
          regex_once(
              playlists,
              r"\(state\)\s*=>\s*_buildPlaylistContent\(context, state\.items\)",
              "(state) => _buildPlaylistContent(\n                              context,\n                              _filterPlaylists(state.items),\n                            )",
          )
          replace_once(
              playlists,
              """  /// 构建加载更多指示器（含错误重试）
          """,
              """  Widget _buildSearchBar() {
            final colorScheme = Theme.of(context).colorScheme;
            final horizontalPadding = context.responsive<double>(
              mobile: AppSpacing.md,
              tablet: AppSpacing.lg,
              desktop: AppSpacing.xl,
              tv: AppSpacing.xxl,
            );

            return Padding(
              padding: EdgeInsets.fromLTRB(
                horizontalPadding,
                AppSpacing.md,
                horizontalPadding,
                0,
              ),
              child: TextField(
                controller: _searchController,
                textInputAction: TextInputAction.search,
                onChanged: _onSearchChanged,
                decoration: InputDecoration(
                  hintText: '搜索歌单名称、简介或标签',
                  prefixIcon: const Icon(Icons.search_rounded),
                  suffixIcon: _searchQuery.isEmpty
                      ? null
                      : IconButton(
                          onPressed: _clearSearch,
                          icon: const Icon(Icons.close_rounded),
                          tooltip: '清除搜索',
                        ),
                  filled: true,
                  fillColor: colorScheme.surfaceContainerLow,
                  border: OutlineInputBorder(
                    borderRadius: BorderRadius.circular(18),
                    borderSide: BorderSide.none,
                  ),
                  enabledBorder: OutlineInputBorder(
                    borderRadius: BorderRadius.circular(18),
                    borderSide: BorderSide(
                      color: colorScheme.outlineVariant.withValues(alpha: 0.24),
                    ),
                  ),
                ),
              ),
            );
          }

          /// 构建加载更多指示器（含错误重试）
          """,
          )
          regex_once(
              playlists,
              r"  AppBar _buildSelectionAppBar\(\n    AsyncValue<PaginatedPlaylistsState> playlistsAsync,\n  \) \{.*?\n  \}\n\n  Widget _buildPlaylistContent",
              """  AppBar _buildSelectionAppBar(
            AsyncValue<PaginatedPlaylistsState> playlistsAsync,
          ) {
            final count = _selectedPlaylistIds.length;
            return AppBar(
              leading: IconButton(
                icon: const Icon(Icons.close_rounded),
                tooltip: '退出多选',
                onPressed: _toggleSelectMode,
              ),
              title: Text('已选择 $count 个'),
              actions: [
                IconButton(
                  icon: const Icon(Icons.play_arrow_rounded),
                  tooltip: '播放所选歌单',
                  onPressed: count == 0 ? null : _playSelectedPlaylists,
                ),
                PopupMenuButton<String>(
                  enabled: count > 0,
                  tooltip: '批量操作',
                  icon: const Icon(Icons.more_horiz_rounded),
                  onSelected: (value) {
                    switch (value) {
                      case 'hide':
                        _batchSetSelectedVisibility(hidden: true);
                      case 'show':
                        _batchSetSelectedVisibility(hidden: false);
                      case 'delete':
                        _confirmBatchDelete();
                    }
                  },
                  itemBuilder: (context) => const [
                    PopupMenuItem(
                      value: 'hide',
                      child: ListTile(
                        leading: Icon(Icons.visibility_off_rounded),
                        title: Text('隐藏所选歌单'),
                        contentPadding: EdgeInsets.zero,
                      ),
                    ),
                    PopupMenuItem(
                      value: 'show',
                      child: ListTile(
                        leading: Icon(Icons.visibility_rounded),
                        title: Text('取消隐藏所选歌单'),
                        contentPadding: EdgeInsets.zero,
                      ),
                    ),
                    PopupMenuDivider(),
                    PopupMenuItem(
                      value: 'delete',
                      child: ListTile(
                        leading: Icon(Icons.delete_outline_rounded),
                        title: Text('删除所选歌单'),
                        contentPadding: EdgeInsets.zero,
                      ),
                    ),
                  ],
                ),
                TextButton(
                  onPressed: () async {
                    await ref
                        .read(playlistListProvider(_selectedType).notifier)
                        .loadAll();
                    final state = ref.read(playlistListProvider(_selectedType)).value;
                    if (state != null) {
                      _selectAll(_filterPlaylists(state.items));
                    }
                  },
                  child: const Text('全选'),
                ),
              ],
            );
          }

          Widget _buildPlaylistContent""",
          )
          replace_once(
              playlists,
              """  /// 批量删除确认弹窗
          """,
              """  Future<void> _batchSetSelectedVisibility({required bool hidden}) async {
            final ids = _selectedPlaylistIds.toList(growable: false);
            if (ids.isEmpty) return;

            final updated = await ref
                .read(playlistNotifierProvider.notifier)
                .batchSetPlaylistVisibility(ids, hidden: hidden);
            if (!mounted) return;

            if (updated == ids.length) {
              ResponsiveSnackBar.showSuccess(
                context,
                message: hidden ? '已隐藏 $updated 个歌单' : '已取消隐藏 $updated 个歌单',
              );
            } else if (updated > 0) {
              ResponsiveSnackBar.showError(
                context,
                message: '仅完成 $updated/${ids.length} 个歌单，请稍后重试',
              );
            } else {
              ResponsiveSnackBar.showError(context, message: '批量操作失败');
            }

            setState(() {
              _isSelectionMode = false;
              _selectedPlaylistIds.clear();
            });
          }

          /// 批量删除确认弹窗
          """,
          )
          regex_once(
              playlists,
              r"  Widget _buildEmptyContent\(\) \{.*?\n  \}\n\n  Widget _buildErrorContent",
              """  Widget _buildEmptyContent() {
            final colorScheme = Theme.of(context).colorScheme;
            final textTheme = Theme.of(context).textTheme;
            final isSearching = _searchQuery.isNotEmpty;

            return Padding(
              padding: const EdgeInsets.all(64),
              child: Center(
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    Container(
                      width: 96,
                      height: 96,
                      decoration: BoxDecoration(
                        color: colorScheme.surfaceContainerHighest,
                        borderRadius: AppRadius.xlAll,
                      ),
                      child: Icon(
                        isSearching
                            ? Icons.search_off_rounded
                            : Icons.queue_music_outlined,
                        size: 48,
                        color: colorScheme.onSurfaceVariant.withValues(alpha: 0.5),
                      ),
                    ),
                    const SizedBox(height: 24),
                    Text(
                      isSearching ? '没有找到匹配的歌单' : '暂无歌单',
                      style: textTheme.titleMedium?.copyWith(
                        color: colorScheme.onSurfaceVariant,
                      ),
                    ),
                    const SizedBox(height: 8),
                    Text(
                      isSearching ? '换一个关键词继续搜索' : '点击右上角按钮创建歌单',
                      style: textTheme.bodySmall?.copyWith(
                        color: colorScheme.onSurfaceVariant.withValues(alpha: 0.7),
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          Widget _buildErrorContent""",
          )

          provider = 'lib/features/playlist/presentation/providers/playlist_provider.dart'
          replace_once(
              provider,
              """  /// 更新歌单最后访问时间
          """,
              """  /// 批量设置歌单可见性，只在全部请求结束后统一刷新列表。
          Future<int> batchSetPlaylistVisibility(
            Iterable<int> ids, {
            required bool hidden,
          }) async {
            final playlistIds = ids.toSet();
            if (playlistIds.isEmpty) return 0;

            state = const AsyncValue.loading();
            var updated = 0;
            try {
              for (final id in playlistIds) {
                await _repository.setPlaylistVisibility(id, hidden: hidden);
                ref.invalidate(playlistDetailProvider(id));
                updated++;
              }
              state = const AsyncValue.data(null);
              ref.invalidate(playlistListProvider);
              return updated;
            } catch (e, st) {
              state = AsyncValue.error(e, st);
              ref.invalidate(playlistListProvider);
              return updated;
            }
          }

          /// 更新歌单最后访问时间
          """,
          )

          scaffold = 'lib/shared/layouts/adaptive_scaffold.dart'
          regex_once(
              scaffold,
              r"  static const int _mobileMaxVisible = 5;.*?\n  Widget _buildOverflowTile\(",
              """  static const int _mobileMaxVisible = 5;
          static const int _mobileRealSlots = 4;

          List<int> _mobileVisibleIndices() {
            if (destinations.length <= _mobileMaxVisible) {
              return List<int>.generate(destinations.length, (index) => index);
            }

            final settingsIndex = destinations.length - 1;
            final visible = <int>[0];
            for (
              var index = 1;
              index < settingsIndex && visible.length < _mobileRealSlots - 1;
              index++
            ) {
              visible.add(index);
            }
            if (!visible.contains(settingsIndex)) {
              visible.add(settingsIndex);
            }
            return visible;
          }

          /// Mobile: 底部导航栏布局。首页与设置始终保留，超出的插件入口收进“更多”。
          Widget _buildMobileLayout(BuildContext context) {
            final visibleIndices = _mobileVisibleIndices();
            final overflowIndices = <int>[
              for (var index = 0; index < destinations.length; index++)
                if (!visibleIndices.contains(index)) index,
            ];
            final hasOverflow = overflowIndices.isNotEmpty;

            if (!hasOverflow) {
              return Scaffold(
                body: body,
                bottomNavigationBar: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    if (bottomPlayer != null) bottomPlayer!,
                    NavigationBar(
                      selectedIndex: currentIndex,
                      onDestinationSelected: onDestinationSelected,
                      destinations: destinations.map((dest) {
                        return NavigationDestination(
                          icon: dest.icon,
                          selectedIcon: dest.selectedIcon,
                          label: dest.label,
                        );
                      }).toList(),
                    ),
                  ],
                ),
              );
            }

            final visibleSelectedIndex = visibleIndices.indexOf(currentIndex);
            final moreIndex = visibleIndices.length;
            final barSelectedIndex =
                visibleSelectedIndex >= 0 ? visibleSelectedIndex : moreIndex;

            return Scaffold(
              body: body,
              bottomNavigationBar: Column(
                mainAxisSize: MainAxisSize.min,
                children: [
                  if (bottomPlayer != null) bottomPlayer!,
                  NavigationBar(
                    selectedIndex: barSelectedIndex,
                    onDestinationSelected: (index) {
                      if (index < visibleIndices.length) {
                        onDestinationSelected(visibleIndices[index]);
                      } else {
                        _showOverflowSheet(context, overflowIndices);
                      }
                    },
                    destinations: [
                      for (final originalIndex in visibleIndices)
                        NavigationDestination(
                          icon: destinations[originalIndex].icon,
                          selectedIcon: destinations[originalIndex].selectedIcon,
                          label: destinations[originalIndex].label,
                        ),
                      const NavigationDestination(
                        icon: Icon(Icons.apps_outlined),
                        selectedIcon: Icon(Icons.apps_rounded),
                        label: '更多',
                      ),
                    ],
                  ),
                ],
              ),
            );
          }

          void _showOverflowSheet(
            BuildContext context,
            List<int> overflowIndices,
          ) {
            final colorScheme = Theme.of(context).colorScheme;

            showModalBottomSheet(
              context: context,
              showDragHandle: true,
              useSafeArea: true,
              builder: (sheetContext) {
                return ListView(
                  shrinkWrap: true,
                  padding: const EdgeInsets.fromLTRB(12, 0, 12, 16),
                  children: [
                    Padding(
                      padding: const EdgeInsets.fromLTRB(8, 2, 8, 10),
                      child: Text(
                        '更多功能',
                        style: Theme.of(context).textTheme.titleMedium?.copyWith(
                              fontWeight: FontWeight.w700,
                            ),
                      ),
                    ),
                    for (final originalIndex in overflowIndices)
                      _buildOverflowTile(
                        sheetContext,
                        destinations[originalIndex],
                        originalIndex,
                        colorScheme,
                      ),
                  ],
                );
              },
            );
          }

          Widget _buildOverflowTile(""",
          )

          plugin_icon = 'lib/features/jsplugin/presentation/widgets/plugin_icon.dart'
          regex_once(
              plugin_icon,
              r"class PluginNavIcon extends StatelessWidget \{.*\Z",
              """class PluginNavIcon extends StatelessWidget {
            final String? iconUrl;
            final double size;
            final Widget fallbackIcon;
            final bool selected;

            const PluginNavIcon({
              super.key,
              this.iconUrl,
              this.size = 24,
              required this.fallbackIcon,
              this.selected = false,
            });

            @override
            Widget build(BuildContext context) {
              final colorScheme = Theme.of(context).colorScheme;
              final iconColor = selected
                  ? colorScheme.primary
                  : colorScheme.onSurfaceVariant;
              final fallback = IconTheme.merge(
                data: IconThemeData(color: iconColor, size: size),
                child: fallbackIcon,
              );

              Widget content = fallback;
              if (iconUrl != null && iconUrl!.isNotEmpty) {
                final url = iconUrl!;
                final isSvg = url.toLowerCase().endsWith('.svg');
                content = isSvg
                    ? SvgPicture.network(
                        url,
                        width: size,
                        height: size,
                        fit: BoxFit.contain,
                        placeholderBuilder: (_) => fallback,
                        errorBuilder: (_, _, _) => fallback,
                      )
                    : ExcludeSemantics(
                        child: Image.network(
                          url,
                          width: size,
                          height: size,
                          fit: BoxFit.cover,
                          errorBuilder: (_, _, _) => fallback,
                        ),
                      );
              }

              return AnimatedContainer(
                duration: const Duration(milliseconds: 180),
                curve: Curves.easeOutCubic,
                width: size + 10,
                height: size + 10,
                padding: const EdgeInsets.all(5),
                decoration: BoxDecoration(
                  color: selected
                      ? colorScheme.primaryContainer.withValues(alpha: 0.72)
                      : colorScheme.surfaceContainerHighest.withValues(alpha: 0.62),
                  borderRadius: BorderRadius.circular(10),
                  border: Border.all(
                    color: selected
                        ? colorScheme.primary.withValues(alpha: 0.34)
                        : colorScheme.outlineVariant.withValues(alpha: 0.24),
                  ),
                ),
                child: ClipRRect(
                  borderRadius: BorderRadius.circular(6),
                  child: SizedBox(
                    width: size,
                    height: size,
                    child: Center(child: content),
                  ),
                ),
              );
            }
          }
          """,
          )

          destinations = 'lib/shared/layouts/active_destinations.dart'
          replace_once(
              destinations,
              """            selectedIcon: PluginNavIcon(
              iconUrl: plugin.iconUrl,
              fallbackIcon: const Icon(Icons.extension_rounded),
            ),
          """,
              """            selectedIcon: PluginNavIcon(
              iconUrl: plugin.iconUrl,
              fallbackIcon: const Icon(Icons.extension_rounded),
              selected: true,
            ),
          """,
          )

          workflow = '.github/workflows/ui-redesign-check.yml'
          workflow_text = Path(workflow).read_text(encoding='utf-8')
          if '  build-android:' not in workflow_text:
              android_job = """
            build-android:
              name: Build Android preview APKs
              needs: analyze
              if: >-
                github.event_name == 'workflow_dispatch' ||
                contains(github.event.head_commit.message, '[platform-build]')
              runs-on: ubuntu-latest
              timeout-minutes: 45
              steps:
                - uses: actions/checkout@v4
                  with:
                    ref: ui-redesign
                - uses: subosito/flutter-action@v2
                  with:
                    flutter-version: '3.41.5'
                    channel: stable
                    cache: true
                - name: Install dependencies
                  run: flutter pub get
                - name: Build release APKs
                  run: flutter build apk --release --split-per-abi
                - name: Upload Android clients
                  uses: actions/upload-artifact@v4
                  with:
                    name: songloft-android-preview
                    path: build/app/outputs/flutter-apk/*-release.apk
                    retention-days: 14
                    if-no-files-found: error

          """
              if '  build-windows:' not in workflow_text:
                  raise SystemExit('build-windows marker missing')
              workflow_text = workflow_text.replace(
                  '  build-windows:',
                  android_job + '  build-windows:',
                  1,
              )
              Path(workflow).write_text(workflow_text, encoding='utf-8')
          PY

      - name: Format updated Dart sources
        run: |
          dart format \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/providers/playlist_provider.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/shared/layouts/active_destinations.dart \
            lib/shared/layouts/adaptive_scaffold.dart

      - name: Commit follow-up
        shell: bash
        run: |
          rm -f .github/workflows/apply-playlist-mobile-nav-followup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/providers/playlist_provider.dart \
            lib/features/jsplugin/presentation/widgets/plugin_icon.dart \
            lib/shared/layouts/active_destinations.dart \
            lib/shared/layouts/adaptive_scaffold.dart \
            .github/workflows/ui-redesign-check.yml \
            .github/workflows/apply-playlist-mobile-nav-followup.yml
          git commit -m "feat(ui): add playlist search and compact mobile navigation [platform-build]"
          git push origin ui-redesign

name: Format Community Branch

on:
  push:
    branches:
      - mobile-experience-completion
    paths:
      - '.github/workflows/format-community-branch.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-experience-completion
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Normalize Dart formatting
        run: dart format lib test
      - name: Commit formatted Dart sources
        shell: bash
        run: |
          if git diff --quiet -- lib test; then
            echo 'No Dart formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib test
          git commit -m 'style: normalize Dart formatting for Community release'
          git push origin HEAD:mobile-experience-completion

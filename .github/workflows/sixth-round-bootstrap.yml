name: Sixth Round Accessibility Bootstrap

on:
  push:
    branches:
      - mobile-sixth-round
    paths:
      - '.github/workflows/sixth-round-bootstrap.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mobile-sixth-round
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Apply sixth-round accessibility changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new, 1))

          accessibility = Path('lib/core/theme/accessibility.dart')
          accessibility.write_text("""import 'package:flutter/material.dart';

/// Centralized access to system accessibility preferences used by Songloft.
class AppAccessibility {
  AppAccessibility._();

  /// Returns the effective system text scale while preventing pathological
  /// values from making fixed media controls unusable.
  static double textScaleOf(BuildContext context) {
    return MediaQuery.textScalerOf(
      context,
    ).scale(1).clamp(1.0, 2.0).toDouble();
  }

  /// Whether the operating system asks apps to reduce or remove animations.
  static bool reduceMotionOf(BuildContext context) {
    return MediaQuery.disableAnimationsOf(context);
  }

  /// Converts a normal animation duration into an accessibility-aware one.
  static Duration motionDuration(BuildContext context, Duration duration) {
    return reduceMotionOf(context) ? Duration.zero : duration;
  }
}
""")


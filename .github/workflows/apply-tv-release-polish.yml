name: Apply TV release polish

on:
  pull_request:
    branches: [tv-sixth-round-icon-polish]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'tv-seventh-round-release-polish'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout TV release-polish branch
        uses: actions/checkout@v4
        with:
          ref: tv-seventh-round-release-polish
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Correct release-polish patch helper
        run: python tool/fix_tv_release_polish_helper.py

      - name: Apply TV release polish
        id: apply_patch
        shell: bash
        run: |
          set +e
          python tool/apply_tv_release_polish.py > tv-release-polish-patch.log 2>&1
          status=$?
          cat tv-release-polish-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-release-polish-patch-log
          path: tv-release-polish-patch.log
          retention-days: 7

      - name: Stop when patch failed
        if: steps.apply_patch.outputs.status != '0'
        run: exit 1

      - name: Format changed files
        run: |
          dart format \
            lib/shared/widgets/tv_focusable.dart \
            lib/shared/layouts/adaptive_scaffold.dart \
            lib/features/library/presentation/library_page.dart \
            lib/features/library/presentation/widgets/song_list_tile.dart \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/playlist_detail_page.dart \
            lib/features/playlist/presentation/widgets/playlist_card.dart \
            lib/features/playlist/presentation/widgets/playlist_list_item.dart \
            lib/features/player/presentation/widgets/playlist_drawer.dart \
            lib/features/player/presentation/widgets/tv_player.dart \
            lib/shared/widgets/delete_song_dialog.dart

      - name: Analyze
        id: analyze
        shell: bash
        run: |
          set +e
          flutter analyze > tv-release-polish-analyze.log 2>&1
          status=$?
          cat tv-release-polish-analyze.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload analyze log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-release-polish-analyze-log
          path: tv-release-polish-analyze.log
          retention-days: 7

      - name: Stop when analyze failed
        if: steps.analyze.outputs.status != '0'
        run: exit 1

      - name: Commit TV release-polish changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/shared/widgets/tv_focusable.dart \
            lib/shared/layouts/adaptive_scaffold.dart \
            lib/features/library/presentation/library_page.dart \
            lib/features/library/presentation/widgets/song_list_tile.dart \
            lib/features/playlist/presentation/playlists_page.dart \
            lib/features/playlist/presentation/playlist_detail_page.dart \
            lib/features/playlist/presentation/widgets/playlist_card.dart \
            lib/features/playlist/presentation/widgets/playlist_list_item.dart \
            lib/features/player/presentation/widgets/playlist_drawer.dart \
            lib/features/player/presentation/widgets/tv_player.dart \
            lib/shared/widgets/delete_song_dialog.dart
          if git diff --cached --quiet; then
            echo "No TV release-polish changes to commit"
          else
            git commit -m "feat(tv): complete remote workflow and release polish"
            git push origin HEAD:tv-seventh-round-release-polish
          fi

      - name: Build Android release APKs
        id: android_build
        shell: bash
        run: |
          set +e
          flutter build apk --release --split-per-abi > tv-release-polish-build.log 2>&1
          status=$?
          cat tv-release-polish-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-release-polish-build-log
          path: tv-release-polish-build.log
          retention-days: 7

      - name: Upload APKs
        if: steps.android_build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: songloft-tv-release-polish-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30

      - name: Fail when Android build failed
        if: steps.android_build.outputs.status != '0'
        run: exit 1
